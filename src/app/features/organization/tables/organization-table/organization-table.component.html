<div class="block h-full">
  <p-menu
    #rowMenu
    [model]="rowMenuItems()"
    [popup]="true"
    appendTo="body"
  />

  <p-table
    #organizationTable
    [value]="[...store.organizations()]"
    [loading]="store.isLoading()"
    [rowHover]="true"
    [stripedRows]="false"
    [paginator]="true"
    [rows]="rows"
    [totalRecords]="store.total()"
    [lazy]="true"
    (onLazyLoad)="onLazyLoad($event)"
    [rowsPerPageOptions]="[10, 25, 50]"
    [showCurrentPageReport]="true"
    paginatorStyleClass="border-b border-surface-200 dark:border-surface-700"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} organizations"
    [(selection)]="selection"
    dataKey="id"
    class="bg-surface-0 dark:bg-surface-900"
  >
    <ng-template #caption>
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div class="flex items-center gap-2">
          <h2 class="font-semibold">Organizations</h2>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <p-iconfield class="flex-1 sm:flex-none">
            <p-inputicon class="pi pi-search" />
            <input
              pInputText
              type="text"
              pSize="small"
              placeholder="Search organizations..."
              [formControl]="searchControl"
              [disabled]="store.isLoading() || store.isDeleting()"
              class="w-full"
            />
          </p-iconfield>

          <p-select
            [options]="statusOptions"
            [formControl]="selectedStatus"
            placeholder="All statuses"
            [showClear]="true"
            class="flex-1 sm:flex-none sm:w-40"
            size="small"
            [disabled]="store.isLoading() || store.isDeleting()"
          />

          <p-splitbutton
            label="New organization"
            icon="pi pi-plus"
            severity="primary"
            [model]="toolbarActions()"
            size="small"
            (onClick)="add.emit()"
            [disabled]="store.isLoading() || store.isDeleting()"
            class="w-full sm:w-auto"
          />
        </div>
      </div>
    </ng-template>

    <ng-template #header>
      <tr class="text-sm">
        <th class="w-12">
          <p-tableHeaderCheckbox />
        </th>

        <th pSortableColumn="name">
          <div class="flex gap-2">
            <span>Name</span>
            <p-sortIcon field="name"/>
          </div>
        </th>

        <th pSortableColumn="status">
          <div class="flex gap-2">
            <span>Status</span>
            <p-sortIcon field="status"/>
          </div>
        </th>

        <th pSortableColumn="createdAt">
          <div class="flex gap-2">
            <span>Created</span>
            <p-sortIcon field="createdAt"/>
          </div>
        </th>

        <th class="w-16"></th>
      </tr>
    </ng-template>

    <ng-template #body let-organization>
      <tr>
        <td>
          <p-tableCheckbox [value]="organization" />
        </td>

        <td>
          <div class="flex items-center gap-3">
            <p-avatar
              [label]="organization.name.charAt(0).toUpperCase()"
              shape="square"
              size="normal"
            />
            <div class="flex flex-col">
              <span class="font-medium text-surface-900 dark:text-surface-100">
                {{ organization.name }}
              </span>

              <span class="text-xs text-surface-500">/{{ organization.slug }}</span>
            </div>
          </div>
        </td>

        <td>
          <p-tag class="rounded-md text-sm bg-surface-0 border border-surface-200" severity="secondary">
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full" [class.bg-green-500]="organization.status === 'active'" [class.bg-red-500]="organization.status === 'inactive'"></div>
              <span class="font-semibold">{{ organization.status | titlecase }}</span>
            </div>
          </p-tag>
        </td>

        <td>
          <span class="text-surface-600 dark:text-surface-400">{{ organization.createdAt | date: 'mediumDate' }}</span>
        </td>

        <td>
          <p-button
            icon="pi pi-ellipsis-v"
            severity="secondary"
            size="small"
            [text]="true"
            (onClick)="onRowMenuToggle($event, organization)"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="6">
          <div class="flex flex-col items-center gap-3 py-8">
            <i class="pi pi-building-2 text-6xl text-surface-400"></i>
            <span class="text-sm text-surface-500">No organizations found.</span>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
