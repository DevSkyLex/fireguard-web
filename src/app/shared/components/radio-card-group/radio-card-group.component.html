<div class="@container">
  <div class="grid grid-cols-1 gap-2 @sm:grid-cols-2 @lg:grid-cols-3">
    @for (option of options(); track option.value; let i = $index) {
      <app-radio-card
        [inputId]="uid + '-' + i"
        [name]="uid"
        [value]="option.value"
        [selectedValue]="value()"
        [label]="option.label"
        [description]="option.description"
        [icon]="option.icon"
        [disabled]="isDisabled()"
        (selected)="select($event)"
      />
    }
  </div>
</div>
