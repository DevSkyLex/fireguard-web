<div
  class="flex h-full w-full flex-col bg-surface-0 text-surface-900 transition-colors dark:bg-surface-950 dark:text-surface-100"
>
  <!-- Sidebar header: only for mobile drawer (logo is in the main header on desktop) -->
  @if (variant() !== 'primary') {
    <section class="shrink-0">
      <app-dashboard-layout-sidebar-header />
    </section>
  }

  <!-- Sidebar navigation -->
  <section class="min-h-0 flex-1 overflow-y-auto">
    @if (variant() === 'primary') {
      <app-dashboard-layout-sidebar-navigation
        [items]="navigationService.primaryItems"
        [showSearch]="false"
        [iconOnly]="true"
      />
    } @else {
      <app-dashboard-layout-sidebar-navigation />
    }
  </section>
</div>
