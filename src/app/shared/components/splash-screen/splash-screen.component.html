@if (rendered()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center overflow-hidden bg-linear-to-br from-surface-950 via-surface-900 to-surface-800 transition-opacity duration-300 ease-out"
    [class.opacity-0]="hiding()"
  >
    <!-- Ambient glows -->
    <div class="pointer-events-none absolute -right-24 top-16 h-72 w-72 rounded-full bg-primary-500/15 blur-3xl"></div>
    <div class="pointer-events-none absolute -left-16 bottom-8 h-56 w-56 rounded-full bg-primary-500/5 blur-3xl"></div>

    <div class="relative flex flex-col items-center gap-6">
      <span class="text-3xl font-bold tracking-tight text-surface-0">
        FireGuard
      </span>
      <p-progressSpinner
        [pt]="{ root: { class: 'w-10 h-10' }, circle: { style: 'stroke: var(--p-primary-500); stroke-width: 4' } }"
      />
    </div>
  </div>
}
