#:schema https://developers.openai.com/codex/config-schema.json

# Project-scoped Codex defaults for Fireguard SSO Web.
# Behavioral architecture rules live in AGENTS.md; this config makes Codex load
# enough of that document and injects a short always-on reminder for this repo.
project_doc_max_bytes = 60000
project_doc_fallback_filenames = ["AGENTS.md"]
project_root_markers = [".git", "angular.json", "package.json"]
model_reasoning_effort = "high"
model_verbosity = "medium"
web_search = "cached"

developer_instructions = """
For this Angular project, treat AGENTS.md and ARCHITECTURE.md as mandatory before planning or editing.
Before changing feature code, read the owning FEATURE.md; for nested features, read both parent and child FEATURE.md.
Respect feature-first ownership, public API boundaries, SignalStore request-state conventions, Hydra data-access rules, and explicit SSR/hydration behavior.
Prefer the narrowest useful validation after edits and do not fix unrelated workspace changes.
"""

[mcp_servers.angular-cli]
command = "npx"
args = ["@angular/cli", "mcp"]
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 120
