<app-card class="min-w-40 flex-1" [title]="title()" [description]="description()">
  <ng-template #content>
    @if (loading(); as loading) {
      <p-skeleton height="48px" />
    } @else {
      <div class="flex flex-col justify-center gap-3">
        <span class="text-5xl font-semibold">
          {{ value() ?? '—' }}
        </span>

        @if (comparison(); as comparison) {
          <div class="flex flex-row items-center gap-2">
            <i class="pi pi-arrow-down-right text-red-500 text-xs"></i>
            <div class="text-sm flex flex-row gap-1">
              <span class="font-semibold">{{ comparison.value }}%</span>
              <span>last period</span>
            </div>
          </div>
        }
      </div>
    }
  </ng-template>
</app-card>
