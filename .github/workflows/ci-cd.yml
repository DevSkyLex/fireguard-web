name: CI/CD VPS

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image references
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_ref="${image_name}:sha-${GITHUB_SHA}"
          latest_ref="${image_name}:latest"

          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${latest_ref}" >> "$GITHUB_OUTPUT"

      - name: Validate build configuration
        shell: bash
        run: |
          test -n "${{ secrets.APP_API_URL }}" || { echo "APP_API_URL secret is required."; exit 1; }
          test -n "${{ secrets.APP_MERCURE_HUB_URL }}" || { echo "APP_MERCURE_HUB_URL secret is required."; exit 1; }

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.latest_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_API_URL=${{ secrets.APP_API_URL }}
            APP_MERCURE_HUB_URL=${{ secrets.APP_MERCURE_HUB_URL }}
            APP_NAME=${{ vars.APP_NAME || 'Fireguard' }}
            APP_MAINTENANCE=${{ vars.APP_MAINTENANCE || 'false' }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    env:
      APP_DIR: ${{ vars.VPS_APP_DIR || 'apps/fireguard-sso-web' }}
      APP_PORT: ${{ vars.VPS_APP_PORT || '4000' }}
      CONTAINER_NAME: fireguard-sso-web
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ github.token }}
      IMAGE_REF: ${{ needs.docker.outputs.image_ref }}

    steps:
      - name: Validate deploy configuration
        shell: bash
        run: |
          test -n "${{ secrets.VPS_HOST }}" || { echo "VPS_HOST secret is required."; exit 1; }
          test -n "${{ secrets.VPS_USER }}" || { echo "VPS_USER secret is required."; exit 1; }
          test -n "${{ secrets.VPS_SSH_KEY }}" || { echo "VPS_SSH_KEY secret is required."; exit 1; }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            mkdir -p "${{ env.APP_DIR }}"

      - name: Upload docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: docker-compose.prod.yml
          target: ${{ env.APP_DIR }}

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ env.APP_DIR }}
          APP_PORT: ${{ env.APP_PORT }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          GHCR_USERNAME: ${{ env.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ env.GHCR_TOKEN }}
          IMAGE_REF: ${{ env.IMAGE_REF }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: APP_DIR,APP_PORT,CONTAINER_NAME,GHCR_USERNAME,GHCR_TOKEN,IMAGE_REF
          script_stop: true
          script: |
            mkdir -p "$APP_DIR"

            cat > "$APP_DIR/.env" <<EOF
            IMAGE_REF=$IMAGE_REF
            APP_PORT=$APP_PORT
            CONTAINER_NAME=$CONTAINER_NAME
            EOF

            cd "$APP_DIR"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps
            docker logout ghcr.io
