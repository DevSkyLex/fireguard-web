<div id="organization-dashboard" class="flex flex-col gap-6">
  <div class="flex flex-col gap-6">
    <section class="flex flex-row items-center gap-4">
      <div class="rounded-lg border border-surface-200 dark:border-surface-700">
        <i class="pi pi-chart-line p-3 text-2xl text-surface-600 dark:text-surface-400"></i>
      </div>

      <div class="flex flex-col">
        <h2 class="text-xl font-semibold">Activity</h2>
        <p class="text-surface-600 dark:text-surface-400">
          Overview of activity trends and key metrics for your organization.
        </p>
      </div>
    </section>

    <section class="flex flex-col gap-6">
      <div class="flex flex-row flex-wrap items-stretch gap-6">
        <app-metric-card
          title="Facilities"
          description="Registered sites"
          icon="pi pi-building"
          [value]="facilityCount()"
          [loading]="dashboardResource.isLoading()"
          [comparison]="facilitiesComparison()"
          class="flex-1"
        />
        <app-metric-card
          title="Members"
          description="Active members"
          icon="pi pi-users"
          [value]="memberCount()"
          [loading]="dashboardResource.isLoading()"
          [comparison]="membersComparison()"
          class="flex-1"
        />
        <app-metric-card
          title="Equipment"
          description="Tracked assets"
          icon="pi pi-shield"
          [value]="equipmentCount()"
          [loading]="dashboardResource.isLoading()"
          [comparison]="equipmentComparison()"
          class="flex-1"
        />
        <app-metric-card
          title="Inspections"
          description="Performed this period"
          icon="pi pi-check-square"
          [value]="inspectionCount()"
          [loading]="dashboardResource.isLoading()"
          [comparison]="inspectionsComparison()"
          class="flex-1"
        />
      </div>

      <div class="grid grid-cols-1 gap-6 lg:grid-cols-12">
        <app-organization-dashboard-overview-trend class="lg:col-span-7" />
        <app-organization-dashboard-inspection-quality-trend class="lg:col-span-5" />
        <app-organization-dashboard-non-conformities-opened-trend class="lg:col-span-6" />
        <app-organization-dashboard-non-conformities-resolved-trend class="lg:col-span-6" />
      </div>
    </section>
  </div>

  <div class="flex flex-col gap-6">
    <section class="flex flex-row items-center gap-4">
      <div class="rounded-lg border border-surface-200 dark:border-surface-700">
        <i class="pi pi-building p-3 text-2xl text-surface-600 dark:text-surface-400"></i>
      </div>

      <div class="flex flex-col">
        <h2 class="text-xl font-semibold">Resources</h2>
        <p class="text-surface-600 dark:text-surface-400">
          Overview of resource trends and key metrics for your organization.
        </p>
      </div>
    </section>

    <section class="flex flex-col gap-6">
      <div class="grid grid-cols-1 gap-6">
        <app-organization-dashboard-asset-growth-trend />
      </div>
    </section>
  </div>
</div>
