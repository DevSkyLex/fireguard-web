<label
  [for]="inputId()"
  class="flex items-start gap-3 p-3 rounded-lg border-2 select-none transition-colors"
  [class.cursor-pointer]="!disabled()"
  [class.cursor-not-allowed]="disabled()"
  [class.opacity-50]="disabled()"
  [class]="selectedValue() === value() ? 'border-primary bg-primary-50/40' : 'border-surface-200 dark:border-surface-800'"
>
  <div class="flex flex-row gap-2 justify-between items-start w-full">
    <div class="flex flex-col gap-1 min-w-0 pt-0.5">
      <span class="text-sm font-medium leading-tight">{{ label() }}</span>

      @if (description(); as description) {
        <span class="text-xs text-surface-500 leading-tight">{{ description }}</span>
      }
    </div>

    <p-radiobutton
      [inputId]="inputId()"
      [name]="name()"
      [value]="value()"
      [ngModel]="selectedValue()"
      (ngModelChange)="selected.emit($event)"
      [disabled]="disabled()"
    />
  </div>
</label>
