<p-card>
  <p-table
    [value]="loading() ? skeletonItems : [...invitations()]"
    dataKey="id"
    [stripedRows]="true"
  >
    <ng-template pTemplate="header"
      ><tr>
        <th i18n="@@org.invTable.email">Email</th>
        <th i18n="@@org.invTable.status">Status</th>
        <th i18n="@@org.invTable.expires">Expires</th>
        <th class="w-20"><span i18n="@@org.invTable.actions" class="sr-only">Actions</span></th>
      </tr></ng-template
    >
    <ng-template pTemplate="body" let-invitation>
      @if (loading()) {
        <tr>
          <td><p-skeleton width="12rem" /></td>
          <td><p-skeleton width="6rem" /></td>
          <td><p-skeleton width="8rem" /></td>
          <td><p-skeleton shape="circle" size="2rem" /></td>
        </tr>
      } @else {
        <tr>
          <td class="font-medium">{{ invitation.email }}</td>
          <td>
            <span
              class="rounded-full border border-surface-200 px-2.5 py-1 text-xs font-semibold dark:border-surface-700"
              >{{ invitation.status }}</span
            >
          </td>
          <td>{{ invitation.expiresAt | date: 'mediumDate' }}</td>
          <td class="text-right">
            @if (canManage() && invitation.status === 'pending') {
              <p-button
                icon="pi pi-times"
                severity="danger"
                [text]="true"
                [rounded]="true"
                i18n-ariaLabel="@@org.invTable.revokeAria"
                ariaLabel="Revoke invitation"
                (onClick)="revoke.emit(invitation)"
              />
            }
          </td>
        </tr>
      }
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr class="bg-transparent! [&>td]:border-b-0!">
        <td colspan="4">
          <app-empty-state
            icon="pi-envelope"
            i18n-title="@@org.invTable.emptyTitle"
            title="No pending invitations"
            i18n-description="@@org.invTable.emptyDesc"
            description="Invitations you send will appear here until they are accepted."
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
