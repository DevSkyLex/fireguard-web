<p-card [pt]="cardPt">
  <ng-template pTemplate="header">
    <div
      class="flex items-center justify-between border-b border-surface-200 px-4 py-3 dark:border-surface-800"
    >
      <h2 i18n="@@org.invoiceTable.title" class="font-semibold">Invoices</h2>
    </div>
  </ng-template>

  <ng-template pTemplate="content">
    <p-table
      [value]="loading() ? skeletonItems : [...invoices()]"
      dataKey="id"
      [paginator]="true"
      [rows]="rows"
      [rowsPerPageOptions]="rowsPerPageOptions"
      [showCurrentPageReport]="true"
      i18n-currentPageReportTemplate="@@org.invoiceTable.pageReport"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} invoices"
      [stripedRows]="true"
      [pt]="tablePt()"
    >
      <ng-template pTemplate="header">
        <tr>
          <th i18n="@@org.invoiceTable.colInvoice" class="min-w-64">Invoice</th>
          <th i18n="@@org.invoiceTable.colDate" class="min-w-36">Date</th>
          <th i18n="@@org.invoiceTable.colAmount" class="min-w-32">Amount</th>
          <th i18n="@@org.invoiceTable.colStatus" class="min-w-40">Status</th>
          <th class="w-20">
            <span i18n="@@org.invoiceTable.actions" class="sr-only">Actions</span>
          </th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-invoice>
        @if (loading()) {
          <tr>
            <td><p-skeleton width="9rem" height="0.875rem" /></td>
            <td><p-skeleton width="7rem" height="0.875rem" /></td>
            <td><p-skeleton width="5rem" height="0.875rem" /></td>
            <td><p-skeleton width="6rem" height="1.75rem" borderRadius="999px" /></td>
            <td><p-skeleton shape="circle" size="2rem" class="ml-auto" /></td>
          </tr>
        } @else {
          <tr class="transition-colors hover:bg-surface-50 dark:hover:bg-surface-900/50">
            <td>
              <span class="truncate font-medium text-surface-900 dark:text-surface-100">
                {{ invoice.number || invoice.id }}
              </span>
            </td>
            <td>
              <span class="text-surface-600 dark:text-surface-400">
                {{ invoice.createdAt | date: 'mediumDate' }}
              </span>
            </td>
            <td>
              <span class="font-medium text-surface-900 dark:text-surface-100">
                {{ amountLabel(invoice) }}
              </span>
            </td>
            <td>
              <app-tag [descriptor]="statusDescriptor(invoice.status)" />
            </td>
            <td class="text-right">
              @if (invoice.invoicePdf || invoice.hostedInvoiceUrl) {
                <p-button
                  icon="pi pi-download"
                  severity="secondary"
                  size="small"
                  [outlined]="true"
                  i18n-ariaLabel="@@org.invoiceTable.downloadAria"
                  ariaLabel="Download invoice"
                  (onClick)="openInvoice(invoice)"
                />
              }
            </td>
          </tr>
        }
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr class="bg-transparent! [&>td]:border-b-0!">
          <td colspan="5">
            <app-empty-state
              icon="pi-file"
              i18n-title="@@org.invoiceTable.emptyTitle"
              title="No invoices yet"
              i18n-description="@@org.invoiceTable.emptyDesc"
              description="Invoices will appear here once your organization is billed."
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </ng-template>
</p-card>
