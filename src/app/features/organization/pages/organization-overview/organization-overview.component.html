<div
  id="organization-overview"
  class="min-h-full bg-[radial-gradient(circle_at_top,_rgba(14,165,233,0.08),_transparent_32%),linear-gradient(180deg,_var(--p-surface-50)_0%,_var(--p-surface-100)_100%)] px-6 py-8 md:px-8 dark:bg-[linear-gradient(180deg,_var(--p-surface-950)_0%,_var(--p-surface-900)_100%)]"
>
  @if (organization(); as org) {
    <app-organization-overview-header
      [organization]="org"
      [modeOptions]="headerModeOptions"
      [activeMode]="activeHeaderMode()"
      [snapshotDateLabel]="snapshotDateLabel"
      (modeChange)="activeHeaderMode.set($event)"
    />
  }

  @if (errorMessage() && !showSkeleton()) {
    <div class="mt-6">
      <p-message severity="error">
        <span>{{ errorMessage() }}</span>
      </p-message>
    </div>
  }

  <section class="mt-6 grid gap-4 xl:grid-cols-3">
    <app-organization-overview-metrics
      [metrics]="headlineMetrics()"
      [showSkeleton]="showSkeleton()"
    />
  </section>

  <section class="mt-6 grid gap-6 xl:grid-cols-[minmax(0,1.55fr)_minmax(320px,0.95fr)]">
    <app-organization-overview-operations-card
      [filterOptions]="pulseFilterOptions"
      [activeFilter]="activePulseFilter()"
      [chartData]="operationsPulseChartData()"
      [chartOptions]="operationsPulseChartOptions"
      [readouts]="operationsReadouts()"
      [hasData]="hasDashboardStatistics()"
      (filterChange)="activePulseFilter.set($event)"
    />

    <div class="grid gap-6">
      <app-organization-overview-focus-board [items]="focusBoardItems()" />

      <app-organization-overview-quick-actions
        [actions]="quickActions"
        (routeSelected)="navigateTo($event)"
      />
    </div>
  </section>

  <section class="mt-6 grid gap-6 xl:grid-cols-[minmax(0,1.2fr)_minmax(320px,0.8fr)]">
    <app-organization-overview-team-card
      [statistics]="membershipStatistics()"
      [chartData]="teamOverviewChartData()"
      [chartOptions]="teamOverviewChartOptions"
      (viewReport)="navigateTo('inspections')"
    />

    <app-organization-overview-risk-card
      [statistics]="nonConformityStatistics()"
      [meterValues]="riskMeterValues()"
      [meterMax]="riskMeterMax()"
    />
  </section>
</div>
