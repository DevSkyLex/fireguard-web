<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-card title="Activity Overview" description="Inspections and non-conformities over time">
  <ng-template #action>
    <div class="flex items-center gap-2">
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-calendar"></i>
        </p-inputgroup-addon>
        <p-select
          [ngModel]="selectedGranularity()"
          (ngModelChange)="onGranularityChange($event)"
          [options]="granularityOptions"
          optionLabel="label"
          optionValue="value"
          [loading]="overviewResource.isLoading()"
          size="small"
        />
      </p-inputgroup>

      <p-button
        icon="pi pi-ellipsis-v"
        severity="secondary"
        size="small"
        outlined
        (onClick)="onMenuToggle($event)"
      />
    </div>
  </ng-template>

  <ng-template #content>
    <div class="flex flex-col flex-1 min-h-[280px]">
      @if (overviewResource.isLoading()) {
        <p-skeleton
          height="100%"
          class="w-full flex-1"
        />
      } @else {
        <p-chart
          type="bar"
          [data]="chartData()"
          [options]="chartOptions"
          class="flex-1"
          height="100%"
          fluid
        />
      }
    </div>
  </ng-template>

  <ng-template #footer>
    <div class="flex flex-wrap items-center gap-2">
      @defer (on idle) {
        <p-datepicker
          selectionMode="range"
          [ngModel]="selectedDateRange()"
          [ngModelOptions]="{ updateOn: 'blur' }"
          (ngModelChange)="selectedDateRange.set($event)"
          placeholder="Select date range"
          [showClear]="true"
          [showTime]="true"
          hourFormat="24"
          size="small"
          appendTo="body"
          dateFormat="dd/mm/yy"
          [disabled]="overviewResource.isLoading()"
        />
      }
      <p-togglebutton
        [ngModel]="compareEnabled()"
        (ngModelChange)="compareEnabled.set($event)"
        onLabel="Compare ON"
        offLabel="Compare OFF"
        size="small"
        [disabled]="overviewResource.isLoading()"
      />
    </div>
  </ng-template>
</app-card>
