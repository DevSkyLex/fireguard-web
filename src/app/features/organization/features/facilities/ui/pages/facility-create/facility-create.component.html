<div id="facility-create" class="flex flex-col">
  <section class="max-w-2xl p-8">
    <h1 class="mb-6 text-2xl font-semibold text-surface-900 dark:text-surface-0">New Facility</h1>

    <app-facility-form
      [loading]="store.isCreating()"
      [parentFacilities]="store.facilities()"
      (submitted)="handleSubmit($event)"
      (cancelled)="handleCancel()"
    />
  </section>

  <app-organization-quota-upgrade-dialog
    [(visible)]="quotaDialogVisible"
    [resource]="quotaResource"
  />
</div>
