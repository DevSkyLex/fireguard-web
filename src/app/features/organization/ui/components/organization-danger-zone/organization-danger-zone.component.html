<div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
  <div class="flex flex-col gap-0.5">
    <span class="text-sm font-medium text-surface-800 dark:text-surface-100">
      Delete this organization
    </span>
    <span class="text-sm text-surface-500 dark:text-surface-400">
      Permanently delete
      <span class="font-medium text-surface-700 dark:text-surface-200">{{
        organization()?.name ?? 'this organization'
      }}</span>
      and all of its data. This cannot be undone.
    </span>
  </div>

  <p-button
    label="Delete organization"
    icon="pi pi-trash"
    severity="danger"
    styleClass="shrink-0 whitespace-nowrap"
    [disabled]="!organization() || deleting()"
    (onClick)="delete.emit()"
  />
</div>
