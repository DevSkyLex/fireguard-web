<div id="organization-list" class="grid grid-rows-[auto_1fr] h-full">
  <section class="flex flex-col gap-2 p-8 bg-surface-50 dark:bg-surface-900 border-b border-surface-200 dark:border-surface-800">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-100">Organizations</h1>
        <p class="text-sm text-surface-700 dark:text-surface-300">Select an organization to manage, or create a new one.</p>
      </div>
      <a routerLink="/onboarding">
        <p-button label="New organization" icon="pi pi-plus" />
      </a>
    </div>
  </section>

  <section class="overflow-auto">
    <app-organization-table
      (view)="onView($event)"
      (edit)="onEdit($event)"
      (add)="onAdd()"
      (deleteSelected)="onDeleteSelected($event)"
    />
  </section>
</div>
