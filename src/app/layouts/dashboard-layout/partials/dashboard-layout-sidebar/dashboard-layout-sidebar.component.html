<aside class="grid grid-cols-1 grid-rows-[auto_1fr_auto] [grid-template-areas:'header'_'navigation'_'footer'] relative h-dvh max-h-dvh w-full bg-surface-0 dark:bg-surface-950 text-surface-900 dark:text-surface-100 transition-colors">
  <!-- Sidebar header -->
  <section class="[grid-area:header]">
    <app-dashboard-layout-sidebar-header />
  </section>

  <!-- Sidebar navigation -->
  <section class="[grid-area:navigation] overflow-y-auto">
    <app-dashboard-layout-sidebar-navigation/>
  </section>

  <!-- Sidebar footer -->
  <section class="[grid-area:footer] border-t border-surface-200 dark:border-surface-800 transition-colors">
    <app-dashboard-layout-sidebar-footer/>
  </section>
</aside>
