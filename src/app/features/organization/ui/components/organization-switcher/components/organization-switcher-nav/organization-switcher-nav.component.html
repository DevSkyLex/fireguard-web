@if (organization(); as org) {
  <div class="border-b border-surface-200 dark:border-surface-800">
    <!-- Current org identity -->
    <div class="flex items-center gap-2 px-3 pt-2.5 pb-1.5">
      <p-avatar
        [image]="org.logoUrl || undefined"
        [label]="org.logoUrl ? undefined : orgInitials(org.name)"
        [pt]="avatarPt(org)"
      />
      <div class="flex min-w-0 flex-col">
        <span
          class="truncate text-xs leading-tight font-semibold text-surface-900 dark:text-surface-100"
        >
          {{ org.name }}
        </span>
        <span i18n="@@org.switcher.current" class="text-[10px] leading-tight text-surface-400"
          >Current organization</span
        >
      </div>
    </div>

    <!-- Management links -->
    <nav class="pb-1">
      <a
        pRipple
        [routerLink]="['/organizations', org.id, 'members']"
        (click)="navigate.emit()"
        class="flex cursor-pointer items-center gap-2.5 px-3 py-1.5 text-sm text-surface-600 transition-colors hover:bg-surface-50 hover:text-surface-900 dark:text-surface-400 dark:hover:bg-surface-800 dark:hover:text-surface-100"
      >
        <i class="pi pi-users w-3.5 shrink-0 text-center text-xs"></i>
        <span i18n="@@org.switcher.members">Members</span>
      </a>
      <a
        pRipple
        [routerLink]="['/organizations', org.id, 'settings']"
        (click)="navigate.emit()"
        class="flex cursor-pointer items-center gap-2.5 px-3 py-1.5 text-sm text-surface-600 transition-colors hover:bg-surface-50 hover:text-surface-900 dark:text-surface-400 dark:hover:bg-surface-800 dark:hover:text-surface-100"
      >
        <i class="pi pi-cog w-3.5 shrink-0 text-center text-xs"></i>
        <span i18n="@@org.switcher.settings">Settings</span>
      </a>
      <a
        pRipple
        [routerLink]="['/organizations', org.id, 'settings']"
        [queryParams]="{ tab: 'subscription' }"
        (click)="navigate.emit()"
        class="flex cursor-pointer items-center gap-2.5 px-3 py-1.5 text-sm text-surface-600 transition-colors hover:bg-surface-50 hover:text-surface-900 dark:text-surface-400 dark:hover:bg-surface-800 dark:hover:text-surface-100"
      >
        <i class="pi pi-credit-card w-3.5 shrink-0 text-center text-xs"></i>
        <span i18n="@@org.switcher.billing">Billing</span>
      </a>
    </nav>
  </div>
}
