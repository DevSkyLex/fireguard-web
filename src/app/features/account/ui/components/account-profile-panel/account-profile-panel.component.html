<div class="flex flex-col gap-6">
  <!-- Avatar: persisted through its own /api/me/avatar endpoint -->
  <app-account-avatar-form
    [avatarUrl]="userStore.avatarUrlMedium()"
    [initials]="userStore.initials()"
    [uploading]="editStore.isUploadingAvatar()"
    [hasError]="editStore.avatarError() !== null"
    (avatarSelected)="uploadAvatar($event)"
  />

  <p-divider class="my-0" />

  <!-- Profile fields: persisted through PATCH /api/me -->
  <app-account-profile-form
    [profile]="userStore.profile()"
    [saving]="editStore.isSaving()"
    [hasSaveError]="editStore.saveError() !== null"
    (submitted)="save($event)"
  />

  <p-divider class="my-0" />

  <!-- Password: changed through the email-verified reset flow -->
  <div
    class="grid grid-cols-1 gap-x-8 gap-y-3 lg:grid-cols-3"
    data-testid="account-password-section"
  >
    <div class="flex flex-col gap-1">
      <span class="text-sm font-medium text-surface-900 dark:text-surface-100">Password</span>
      <p class="text-sm text-surface-500 dark:text-surface-400">
        Keep your account secure with a strong, unique password.
      </p>
    </div>
    <div class="flex flex-col items-start gap-2 lg:col-span-2">
      <p class="text-sm text-surface-600 dark:text-surface-400">
        For security reasons, changing your password requires verification by email. We'll send a
        one-time code to your address to confirm it's you.
      </p>
      <p-button
        label="Change password"
        icon="pi pi-key"
        severity="secondary"
        [outlined]="true"
        routerLink="/auth/password-reset/forgot"
        data-testid="account-change-password-button"
      />
    </div>
  </div>
</div>
