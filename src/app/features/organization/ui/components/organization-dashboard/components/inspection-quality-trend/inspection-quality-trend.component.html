<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  title="Inspection Quality"
  description="Inspection throughput versus opened non-conformity pressure"
  [metrics]="summaryMetrics()"
  [loading]="isLoading()"
>
  <ng-template #action>
    <app-inspection-quality-toolbar
      [activeFilterCount]="activeFilterCount()"
      (filterToggle)="onFilterToggle()"
      (menuToggle)="onMenuToggle($event)"
    />
  </ng-template>

  <ng-template #content>
    <app-inspection-quality-chart />
  </ng-template>
</app-trend-card>

<app-trend-filter-drawer
  title="Inspection Quality Filters"
  description="Refine inspection quality metrics by inspection scope, NC severity, period, and comparison mode."
  [visible]="isFilterDrawerVisible()"
  [loading]="isLoading()"
  (cancel)="onCancelFilters()"
  (reset)="onResetFilters()"
  (apply)="onApplyFilters()"
>
  <app-inspection-quality-filters />
</app-trend-filter-drawer>
