<div class="flex items-center gap-2">
  <p-inputgroup>
    <p-inputgroup-addon>
      <i class="pi pi-calendar"></i>
    </p-inputgroup-addon>
    <p-select
      [formControl]="granularityControl"
      [options]="store.granularityOptions()"
      optionLabel="label"
      optionValue="value"
      [loading]="store.isQueryLoading()"
      size="small"
    />
  </p-inputgroup>

  <p-overlay-badge [badgeDisabled]="activeFilterCount() <= 0">
    <p-button
      label="Filters"
      icon="pi pi-filter"
      severity="secondary"
      size="small"
      [outlined]="true"
      [disabled]="!filtersAvailable()"
      (onClick)="filterToggle.emit()"
    />
  </p-overlay-badge>

  <p-button
    icon="pi pi-ellipsis-v"
    severity="secondary"
    size="small"
    outlined
    (onClick)="menuToggle.emit($event)"
  />
</div>
