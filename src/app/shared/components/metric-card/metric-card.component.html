<p-card [pt]="cardPt">
  <ng-template pTemplate="header">
    <div class="flex flex-row items-center justify-between">
      <div class="flex flex-row items-center gap-3">
        @if (icon(); as icon) {
          <div
            class="grid content-center rounded-lg border border-surface-200 p-2 dark:border-surface-700"
          >
            <i class="{{ icon }} text-lg text-surface-500 dark:text-surface-400"></i>
          </div>
        }

        <div class="flex flex-col">
          <span class="text-sm font-medium">
            {{ title() }}
          </span>

          @if (description(); as description) {
            <span class="text-xs text-surface-500">
              {{ description }}
            </span>
          }
        </div>
      </div>

      @if (action(); as action) {
        <ng-container *ngTemplateOutlet="action" />
      }
    </div>
  </ng-template>

  <ng-template pTemplate="content">
    @if (loading()) {
      <p-skeleton height="48px" />
    } @else {
      <div class="flex flex-col justify-center gap-3">
        <span class="text-5xl font-semibold">
          {{ value() ?? '—' }}
        </span>

        @if (comparison(); as comparison) {
          <div class="flex flex-row items-center gap-2">
            <i
              class="text-xs"
              [class]="
                comparison.direction === 'up'
                  ? 'pi pi-arrow-up-right text-green-500'
                  : 'pi pi-arrow-down-right text-red-500'
              "
            ></i>
            <div class="flex flex-row gap-1 text-sm">
              <span class="font-semibold">{{ comparison.value }}</span>
              <span class="text-surface-500">last period</span>
            </div>
          </div>
        }
      </div>
    }
  </ng-template>
</p-card>
