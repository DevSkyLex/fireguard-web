<div [formGroup]="form" class="grid gap-4">
  <div class="flex flex-col gap-2">
    <label
      for="non-conformities-resolved-status"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
    >
      Status
    </label>

    <p-select
      id="non-conformities-resolved-status"
      formControlName="nonConformityStatus"
      [options]="nonConformityStatusOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="All statuses"
      [showClear]="true"
      [loading]="store.isQueryLoading()"
      class="w-full"
    >
      <ng-template #item let-option>
        <span class="flex items-center gap-2">
          <i [class]="option.icon" [style.color]="option.color"></i>
          {{ option.label }}
        </span>
      </ng-template>
      <ng-template #selectedItem>
        @let option = selectedNonConformityStatusOption();
        @if (option) {
          <span class="flex items-center gap-2">
            <i [class]="option.icon" [style.color]="option.color"></i>
            {{ option.label }}
          </span>
        }
      </ng-template>
    </p-select>
  </div>

  <div class="flex flex-col gap-2">
    <label
      for="non-conformities-resolved-severity"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
    >
      Severity
    </label>

    <p-select
      id="non-conformities-resolved-severity"
      formControlName="nonConformitySeverity"
      [options]="nonConformitySeverityOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="All severities"
      [showClear]="true"
      [loading]="store.isQueryLoading()"
      class="w-full"
    >
      <ng-template #item let-option>
        <span class="flex items-center gap-2">
          <span
            class="inline-block h-2 w-2 shrink-0 rounded-full"
            [style.background-color]="option.color"
          ></span>
          {{ option.label }}
        </span>
      </ng-template>
      <ng-template #selectedItem>
        @let option = selectedSeverityOption();
        @if (option) {
          <span class="flex items-center gap-2">
            <span
              class="inline-block h-2 w-2 shrink-0 rounded-full"
              [style.background-color]="option.color"
            ></span>
            {{ option.label }}
          </span>
        }
      </ng-template>
    </p-select>
  </div>

  <app-trend-base-filters-form
    dateRangeId="non-conformities-resolved-date-range"
    [dateRange]="store.draftDateRange()"
    [compareEnabled]="store.draftCompareEnabled()"
    [loading]="store.isQueryLoading()"
    (dateRangeChange)="store.setDraftDateRange($event)"
    (compareEnabledChange)="store.setDraftCompareEnabled($event)"
  />
</div>
