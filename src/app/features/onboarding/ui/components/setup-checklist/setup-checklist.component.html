@if (store.isActivationVisible()) {
  <!-- Trigger -->
  <button
    type="button"
    class="inline-flex items-center gap-2 rounded-full border border-surface-200 bg-surface-0 py-1.5 pr-2 pl-3 text-sm font-medium text-surface-700 transition-colors hover:bg-surface-50 dark:border-surface-800 dark:bg-surface-950 dark:text-surface-200 dark:hover:bg-surface-900"
    aria-label="Open setup checklist"
    i18n-aria-label="@@onboarding.checklist.ariaOpen"
    (click)="toggle($event)"
  >
    <i class="pi pi-flag-fill text-sm text-primary"></i>
    <span class="hidden sm:inline" i18n="@@onboarding.checklist.trigger">Finish setup</span>
    <span
      class="inline-flex min-w-5 items-center justify-center rounded-full bg-primary px-1.5 text-xs font-semibold text-white"
    >
      {{ store.progress().done }}/{{ store.progress().total }}
    </span>
  </button>

  <!-- Checklist panel -->
  <p-popover #popover [pt]="popoverPt">
    <div class="w-80">
      <!-- Header -->
      <div class="border-b border-surface-200 px-4 py-3.5 dark:border-surface-800">
        <p
          class="text-sm font-semibold text-surface-900 dark:text-surface-0"
          i18n="@@onboarding.checklist.title"
        >
          Finish setting up
        </p>
        <p class="mt-0.5 text-xs text-surface-500 dark:text-surface-400">
          <ng-container i18n="@@onboarding.checklist.progress"
            >{{ store.progress().done }} of {{ store.progress().total }} done</ng-container
          >
        </p>
        <div class="mt-2.5 h-1.5 overflow-hidden rounded-full bg-surface-200 dark:bg-surface-800">
          <div
            class="h-full rounded-full bg-primary transition-[width] duration-300"
            [style.width.%]="
              store.progress().total > 0
                ? (store.progress().done / store.progress().total) * 100
                : 0
            "
          ></div>
        </div>
      </div>

      <!-- Steps -->
      <ul class="flex flex-col py-1.5">
        @for (step of store.steps(); track step.key) {
          <li class="flex items-center gap-3 px-4 py-2">
            <i [class]="stepStatusIcon(step.status)"></i>
            <i
              class="pi {{
                stepMeta[step.key].icon
              }} text-sm text-surface-400 dark:text-surface-500"
            ></i>
            <span
              class="flex-1 text-sm"
              [class]="
                step.status === 'completed'
                  ? 'text-surface-400 line-through dark:text-surface-500'
                  : 'text-surface-700 dark:text-surface-200'
              "
            >
              {{ stepMeta[step.key].label }}
            </span>
          </li>
        }
      </ul>

      <!-- Footer -->
      <div class="flex flex-col gap-1.5 border-t border-surface-200 p-3 dark:border-surface-800">
        <p-button
          styleClass="w-full"
          size="small"
          icon="pi pi-arrow-right"
          iconPos="right"
          label="Continue setup"
          i18n-label="@@onboarding.checklist.continue"
          (onClick)="continueSetup()"
        />
        <p-button
          styleClass="w-full"
          size="small"
          severity="secondary"
          [text]="true"
          label="Hide for now"
          i18n-label="@@onboarding.checklist.hide"
          [loading]="store.isDismissing()"
          (onClick)="hideForNow()"
        />
      </div>
    </div>
  </p-popover>
}
