<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FireguardSsoWeb</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <div
      id="static-splash"
      style="
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
      "
    >
      <div style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem">
        <div style="font-size: 2rem; font-weight: 700; letter-spacing: 0.05em; color: #3b82f6">
          FireGuard
        </div>
        <div style="font-size: 1.5rem; color: #3b82f6" class="pi pi-spin pi-spinner"></div>
      </div>
    </div>
    <script>
      (function () {
        try {
          var theme = document.cookie.match(/theme-preference=(light|dark)/);
          if (
            (theme && theme[1] === 'dark') ||
            (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            var s = document.getElementById('static-splash');
            if (s) s.style.background = '#09090b';
          }
        } catch (e) {}
      })();
    </script>
    <app-root></app-root>
  </body>
</html>
