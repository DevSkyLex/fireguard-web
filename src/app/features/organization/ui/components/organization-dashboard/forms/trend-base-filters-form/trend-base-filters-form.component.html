<div [formGroup]="form" class="grid gap-4">
  <div class="flex flex-col gap-2">
    <label
      [for]="dateRangeId()"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
    >
      Date range
    </label>

    @defer (on idle) {
      <p-datepicker
        [id]="dateRangeId()"
        selectionMode="range"
        formControlName="dateRange"
        [maxDate]="today"
        placeholder="Select date range"
        [showClear]="true"
        [showTime]="true"
        hourFormat="24"
        appendTo="body"
        dateFormat="dd/mm/yy"
        class="w-full"
      />
    }
  </div>

  <section
    class="flex items-center justify-between gap-3 rounded-border border border-surface-200 bg-surface-50 px-3 py-3 dark:border-surface-700 dark:bg-surface-900"
  >
    <div class="min-w-0">
      <p class="text-sm font-medium text-surface-900 dark:text-surface-0">
        Compare previous period
      </p>
      <p class="text-xs text-surface-500 dark:text-surface-400">
        Overlay the previous period on the chart and summary metrics.
      </p>
    </div>

    <p-togglebutton
      formControlName="compareEnabled"
      onLabel="On"
      offLabel="Off"
      class="shrink-0"
    />
  </section>
</div>
