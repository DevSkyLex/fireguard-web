<section
  class="flex min-h-0 flex-1 flex-col rounded-lg border border-surface-200 bg-surface-0 dark:border-surface-800 dark:bg-surface-950"
>
  <header
    class="flex items-center justify-between border-b border-surface-200 px-4 py-3 dark:border-surface-800"
  >
    <div class="flex items-center gap-2">
      <i class="pi pi-list-check text-sm text-surface-500"></i>
      <h2
        class="text-sm font-semibold text-surface-900 dark:text-surface-100"
        i18n="@@checklist.itemTable.title"
      >
        Checklist lines
      </h2>
    </div>
    <span class="text-xs text-surface-500" i18n="@@checklist.lineCount"
      >{{ items().length }} line(s)</span
    >
  </header>
  <p-table class="min-h-0 flex-1" [value]="[...items()]" dataKey="id" [stripedRows]="true">
    <ng-template pTemplate="header">
      <tr>
        <th class="w-24" i18n="@@checklist.col.position">Position</th>
        <th i18n="@@checklist.col.line">Line</th>
        <th i18n="@@common.description">Description</th>
        <th class="w-32" i18n="@@checklist.col.requirement">Requirement</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>
          <span
            class="inline-flex size-7 items-center justify-center rounded-full bg-surface-100 text-xs font-semibold text-surface-600 dark:bg-surface-800 dark:text-surface-300"
          >
            {{ item.position }}
          </span>
        </td>
        <td class="font-medium text-surface-900 dark:text-surface-100">{{ item.label }}</td>
        <td class="text-surface-500">
          @if (item.description) {
            {{ item.description }}
          } @else {
            <ng-container i18n="@@checklist.noDescription">No description</ng-container>
          }
        </td>
        <td>
          @if (item.required) {
            <p-tag value="Required" i18n-value="@@checklist.required" severity="warn" />
          } @else {
            <p-tag value="Optional" i18n-value="@@checklist.optional" severity="secondary" />
          }
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr class="bg-transparent! [&>td]:border-b-0!">
        <td colspan="4">
          <app-empty-state
            icon="pi-list-check"
            title="This checklist has no lines"
            i18n-title="@@checklist.itemTable.emptyTitle"
            description="Checklist items will appear here."
            i18n-description="@@checklist.itemTable.emptyDesc"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>
