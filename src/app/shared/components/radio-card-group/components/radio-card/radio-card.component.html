<label
  [for]="inputId()"
  class="relative flex h-full items-start gap-3 overflow-hidden rounded-lg border p-4 transition-colors select-none"
  [class.cursor-pointer]="!disabled()"
  [class.cursor-not-allowed]="disabled()"
  [class.opacity-50]="disabled()"
  [class]="
    selectedValue() === value()
      ? 'border-primary bg-primary-50/20 dark:border-primary-700 dark:bg-primary-950/10'
      : 'border-surface-200 dark:border-surface-800 dark:bg-surface-950'
  "
>
  @if (icon(); as icon) {
    <i
      [class]="icon + ' pointer-events-none absolute top-1/2 -right-8 -translate-y-1/2 text-9xl'"
      [class.text-primary-100/75]="selectedValue() === value()"
      [class.dark:text-primary-950]="selectedValue() === value()"
      [class.text-surface-100/75]="selectedValue() !== value()"
      [class.dark:text-surface-900]="selectedValue() !== value()"
      aria-hidden="true"
    ></i>
  }

  <div class="relative z-10 flex w-full flex-row items-start justify-between gap-2">
    <div class="flex min-w-0 flex-col gap-1 pt-0.5">
      @if (icon(); as icon) {
        <i
          [class]="icon + ' mb-1 text-xl text-primary dark:text-primary-300'"
          aria-hidden="true"
        ></i>
      }

      <span class="text-base leading-tight font-medium text-surface-900 dark:text-surface-100">
        {{ label() }}
      </span>

      @if (description(); as description) {
        <span class="text-sm leading-normal text-surface-500 dark:text-surface-400">
          {{ description }}
        </span>
      }
    </div>

    <p-radiobutton
      [inputId]="inputId()"
      [name]="name()"
      [value]="value()"
      [ngModel]="selectedValue()"
      (ngModelChange)="selected.emit($event)"
      [disabled]="disabled()"
    />
  </div>
</label>
