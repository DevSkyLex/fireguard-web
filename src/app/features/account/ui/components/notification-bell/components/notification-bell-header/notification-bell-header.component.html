<div
  class="flex items-center justify-between border-b border-surface-200 px-4 py-3 dark:border-surface-800"
>
  <div class="flex items-center gap-2">
    <i class="pi pi-bell text-sm text-surface-600 dark:text-surface-400"></i>
    <span
      class="text-sm font-semibold text-surface-900 dark:text-surface-100"
      i18n="@@common.notifications"
      >Notifications</span
    >
  </div>

  @if (hasUnread()) {
    <span
      class="inline-flex items-center justify-center rounded-full bg-primary px-2 py-0.5 text-xs font-medium text-white"
    >
      {{ unreadCount() }}
    </span>
  }
</div>
