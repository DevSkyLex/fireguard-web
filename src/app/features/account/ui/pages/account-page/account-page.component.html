<div id="account-page" class="flex flex-col gap-6">
  <app-account-profile-header />

  <div class="grid grid-cols-1 items-start gap-6 lg:grid-cols-[16rem_minmax(0,1fr)]">
    <!-- Vertical section navigation (sticky on large screens) -->
    <nav
      class="flex flex-col gap-1 rounded-xl border border-surface-200 bg-surface-0 p-2 lg:sticky lg:top-6 dark:border-surface-800 dark:bg-surface-950"
      aria-label="Account sections"
    >
      @for (item of navItems; track item.id) {
        <button
          type="button"
          class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-left text-sm transition-colors"
          [class.bg-primary-50]="activeTab() === item.id"
          [class.text-primary]="activeTab() === item.id"
          [class.font-medium]="activeTab() === item.id"
          [class.dark:bg-primary-950]="activeTab() === item.id"
          [class.text-surface-600]="activeTab() !== item.id"
          [class.hover:bg-surface-100]="activeTab() !== item.id"
          [class.dark:text-surface-300]="activeTab() !== item.id"
          [class.dark:hover:bg-surface-800]="activeTab() !== item.id"
          [attr.aria-current]="activeTab() === item.id ? 'page' : null"
          (click)="onTabChange(item.id)"
        >
          <i [class]="item.icon"></i>
          <span class="flex-1">{{ item.label }}</span>
          @if (item.id === 'notifications' && notificationStore.hasUnread()) {
            <p-badge [value]="notificationStore.unreadCount()" severity="contrast" size="small" />
          }
        </button>
      }
    </nav>

    <!-- Active section content -->
    <div class="min-w-0">
      @switch (activeTab()) {
        @case ('profile') {
          <app-account-profile-panel />
        }
        @case ('security') {
          <div class="grid grid-cols-1 items-start gap-6 xl:grid-cols-2">
            <app-account-sessions-panel />
            <app-account-trusted-devices-panel />
          </div>
        }
        @case ('notifications') {
          <app-account-notifications-panel />
        }
      }
    </div>
  </div>
</div>
