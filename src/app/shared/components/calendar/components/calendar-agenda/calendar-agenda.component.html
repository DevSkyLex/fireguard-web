<div class="flex flex-col gap-7">
  @for (day of agendaDays(); track day.date.getTime()) {
    <section>
      <!-- Sticky day header bleeds across the scroll container's padding. -->
      <div
        class="sticky top-0 z-10 -mx-4 flex items-center justify-between gap-3 border-b border-surface-200 bg-surface-0 px-4 py-2 dark:border-surface-800 dark:bg-surface-900"
      >
        <div class="flex items-baseline gap-2">
          <h3
            class="text-sm font-semibold first-letter:uppercase"
            [class]="
              isToday(day.date)
                ? 'text-primary-600 dark:text-primary-400'
                : 'text-surface-900 dark:text-surface-50'
            "
          >
            {{ day.date | date: 'EEEE d MMMM' }}
          </h3>
          @if (relativeLabel(day.date); as label) {
            <span
              class="rounded-full bg-primary-50 px-1.5 py-0.5 text-[0.65rem] font-semibold tracking-wide text-primary-700 uppercase dark:bg-primary-950/40 dark:text-primary-300"
            >
              {{ label }}
            </span>
          }
        </div>
        <p-button
          icon="pi pi-plus"
          label="Add"
          severity="secondary"
          size="small"
          [text]="true"
          [attr.aria-label]="'Create on ' + (day.date | date: 'longDate')"
          (onClick)="dayCreate.emit(day.date)"
        />
      </div>

      <ul class="mt-1 flex flex-col">
        @for (event of day.events; track event.id) {
          <li>
            <button
              type="button"
              class="flex w-full items-start gap-3 rounded-md px-2 py-2.5 text-left transition-colors hover:bg-surface-100 motion-reduce:transition-none dark:hover:bg-surface-800/60"
              [attr.aria-label]="'Open ' + event.title"
              (click)="eventClick.emit(event)"
            >
              <!-- Time gutter (agenda-owned chrome) -->
              <span
                class="flex w-12 shrink-0 flex-col items-end pt-px leading-tight tabular-nums"
                aria-hidden="false"
              >
                @if (isAllDay(event)) {
                  <span class="text-[0.7rem] font-medium text-surface-400 dark:text-surface-500">
                    all-day
                  </span>
                } @else {
                  <span class="text-xs font-semibold text-surface-800 dark:text-surface-100">
                    {{ event.start | date: 'HH:mm' }}
                  </span>
                  @if (endTime(event); as end) {
                    <span class="text-[0.7rem] text-surface-400 dark:text-surface-500">
                      {{ end | date: 'HH:mm' }}
                    </span>
                  }
                }
              </span>

              <!-- Event body (consumer-owned template) -->
              <span class="min-w-0 flex-1 pt-px">
                <ng-container
                  [ngTemplateOutlet]="eventTemplate()"
                  [ngTemplateOutletContext]="{ $implicit: event }"
                />
              </span>
            </button>
          </li>
        }
      </ul>
    </section>
  }
</div>
