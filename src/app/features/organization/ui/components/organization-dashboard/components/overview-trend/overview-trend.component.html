<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  title="Operational Flow"
  description="Inspection throughput and non-conformity pressure over time"
  [metrics]="summaryMetrics()"
  [loading]="isLoading()"
>
  <ng-template #action>
    <app-overview-toolbar
      (menuToggle)="onMenuToggle($event)"
    />
  </ng-template>

  <ng-template #content>
    <app-overview-chart />
  </ng-template>

  <ng-template #footer>
    <app-overview-filters />
  </ng-template>
</app-trend-card>
