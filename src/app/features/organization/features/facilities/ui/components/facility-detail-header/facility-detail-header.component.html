@let facility = this.facility();

<div
  class="flex flex-col gap-4 rounded-xl border border-surface-200 bg-surface-0 p-4 lg:flex-row lg:items-start lg:justify-between dark:border-surface-800 dark:bg-surface-950"
>
  <div class="flex min-w-0 items-start gap-3">
    <p-avatar [icon]="facilityTypeIcons[facility.type]" shape="square" size="xlarge" />

    <div class="flex min-w-0 flex-col gap-1">
      <div class="flex flex-wrap items-center gap-2">
        <h1
          class="truncate text-2xl font-semibold text-surface-900 dark:text-surface-100"
          [title]="facility.name"
        >
          {{ facility.name }}
        </h1>

        <p-tag
          class="rounded-md text-xs"
          [severity]="facility.type === 'site' ? 'info' : 'secondary'"
        >
          <div class="flex items-center gap-1.5">
            <i [class]="facilityTypeIcons[facility.type]" class="text-xs"></i>
            <span class="font-semibold">{{ facility.type | titlecase }}</span>
          </div>
        </p-tag>

        <span
          class="inline-flex items-center gap-1.5 rounded-full bg-surface-100 px-2 py-0.5 text-xs font-medium text-surface-600 dark:bg-surface-800 dark:text-surface-400"
        >
          <span
            class="h-1.5 w-1.5 rounded-full"
            [class]="getStatusDotClass(facility.status)"
          ></span>
          {{ facility.status | titlecase }}
        </span>
      </div>

      <div class="flex flex-wrap items-center gap-3 text-sm text-surface-500 dark:text-surface-300">
        @if (facility.address) {
          <span class="inline-flex items-center gap-1.5">
            <i class="pi pi-map-marker text-xs"></i>
            {{ facility.address }}
          </span>
        }

        @if (facility.code) {
          <span class="font-mono">{{ facility.code }}</span>
        }

        <span i18n="@@facility.header.updated"
          >Updated {{ facility.updatedAt | date: 'mediumDate' }}</span
        >
      </div>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <p-button
      i18n-label="@@facility.header.move"
      label="Move"
      icon="pi pi-arrow-right-arrow-left"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="move.emit()"
    />
    <p-button
      i18n-label="@@common.edit"
      label="Edit"
      icon="pi pi-pencil"
      severity="success"
      size="small"
      (onClick)="edit.emit()"
    />
  </div>
</div>
