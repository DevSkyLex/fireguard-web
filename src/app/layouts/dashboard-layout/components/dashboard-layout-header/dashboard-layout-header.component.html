<header
  class="flex items-center gap-4 border-b border-surface-200 bg-surface-0 px-6 py-2 transition-colors dark:border-surface-800 dark:bg-surface-950"
>
  <section class="lg:hidden">
    <p-button
      icon="pi pi-bars"
      severity="secondary"
      [text]="true"
      [rounded]="true"
      ariaLabel="Open navigation menu"
      (onClick)="sidebarService.open()"
    />
  </section>

  <!-- Header Breadcrumb -->
  <section class="flex min-w-0 flex-1 overflow-hidden">
    <app-dashboard-layout-breadcrumb class="min-w-0 flex-1" />
  </section>

  <section class="ml-auto flex items-center gap-2">
    <app-organization-switcher />
    <app-theme-switcher />
    <app-notification-bell />
  </section>
</header>
