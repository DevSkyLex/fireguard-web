<header
  class="flex h-16 shrink-0 items-center border-b border-surface-200 bg-surface-0 transition-colors dark:border-surface-800 dark:bg-surface-950"
>
  <!-- Mobile sidebar toggle (also acts as brand area on small screens) -->
  <section class="flex items-center px-2 lg:hidden">
    <p-button
      icon="pi pi-bars"
      severity="secondary"
      [text]="true"
      [rounded]="true"
      ariaLabel="Open navigation menu"
      i18n-ariaLabel="@@layout.header.openMenu"
      (onClick)="sidebarService.open()"
    />
  </section>

  <!-- Header Breadcrumb -->
  <section class="flex min-w-0 flex-1 overflow-hidden px-5">
    <app-dashboard-layout-breadcrumb class="min-w-0 flex-1" />
  </section>

  <section class="flex shrink-0 items-center gap-2 px-5">
    @for (action of headerActionsService.actions; track action.id) {
      @if (action.id === 'user-menu') {
        <p-divider class="-mx-1 h-6" layout="vertical" [pt]="dividerPt" />
      }

      <ng-container *ngComponentOutlet="action.component" />
    }
  </section>
</header>
