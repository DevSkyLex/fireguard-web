<form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-10">
  <!-- Delivery channels -->
  <section class="flex flex-col">
    <h3 class="mb-3 text-base font-medium text-surface-500 dark:text-surface-400">
      Delivery channels
    </h3>

    <div class="divide-y divide-surface-100 dark:divide-surface-800/70">
      <div class="flex items-center justify-between gap-6 py-4">
        <label for="notifications-email" class="flex cursor-pointer flex-col gap-0.5">
          <span class="text-sm font-medium text-surface-800 dark:text-surface-100">Email</span>
          <span class="text-sm text-surface-500 dark:text-surface-400">
            Send organization notifications by email.
          </span>
        </label>
        <p-toggleswitch inputId="notifications-email" formControlName="emailEnabled" />
      </div>

      <div class="flex items-center justify-between gap-6 py-4">
        <label for="notifications-in-app" class="flex cursor-pointer flex-col gap-0.5">
          <span class="text-sm font-medium text-surface-800 dark:text-surface-100">In-app</span>
          <span class="text-sm text-surface-500 dark:text-surface-400">
            Show real-time notifications inside the application.
          </span>
        </label>
        <p-toggleswitch inputId="notifications-in-app" formControlName="inAppEnabled" />
      </div>
    </div>
  </section>

  <!-- Event notifications -->
  <section class="flex flex-col">
    <h3 class="mb-3 text-base font-medium text-surface-500 dark:text-surface-400">
      Notify the organization when…
    </h3>

    <div class="divide-y divide-surface-100 dark:divide-surface-800/70">
      <div class="flex items-center justify-between gap-6 py-4">
        <label
          for="notifications-intervention-published"
          class="flex cursor-pointer flex-col gap-0.5"
        >
          <span class="text-sm font-medium text-surface-800 dark:text-surface-100">
            An intervention is published
          </span>
          <span class="text-sm text-surface-500 dark:text-surface-400">
            A field intervention is finalized and published to the team.
          </span>
        </label>
        <p-toggleswitch
          inputId="notifications-intervention-published"
          formControlName="interventionPublished"
        />
      </div>

      <div class="flex items-center justify-between gap-6 py-4">
        <label
          for="notifications-intervention-assigned"
          class="flex cursor-pointer flex-col gap-0.5"
        >
          <span class="text-sm font-medium text-surface-800 dark:text-surface-100">
            An intervention is assigned
          </span>
          <span class="text-sm text-surface-500 dark:text-surface-400">
            An intervention is assigned to a responsible agent.
          </span>
        </label>
        <p-toggleswitch
          inputId="notifications-intervention-assigned"
          formControlName="interventionAssigned"
        />
      </div>

      <div class="flex items-center justify-between gap-6 py-4">
        <label for="notifications-inspection-due" class="flex cursor-pointer flex-col gap-0.5">
          <span class="text-sm font-medium text-surface-800 dark:text-surface-100">
            An inspection is due
          </span>
          <span class="text-sm text-surface-500 dark:text-surface-400">
            A scheduled inspection is approaching or overdue.
          </span>
        </label>
        <p-toggleswitch inputId="notifications-inspection-due" formControlName="inspectionDue" />
      </div>

      <div class="flex items-center justify-between gap-6 py-4">
        <label
          for="notifications-non-conformity-opened"
          class="flex cursor-pointer flex-col gap-0.5"
        >
          <span class="text-sm font-medium text-surface-800 dark:text-surface-100">
            A non-conformity is opened
          </span>
          <span class="text-sm text-surface-500 dark:text-surface-400">
            An inspection opens a new equipment non-conformity.
          </span>
        </label>
        <p-toggleswitch
          inputId="notifications-non-conformity-opened"
          formControlName="nonConformityOpened"
        />
      </div>

      <div class="flex items-center justify-between gap-6 py-4">
        <label for="notifications-member-invited" class="flex cursor-pointer flex-col gap-0.5">
          <span class="text-sm font-medium text-surface-800 dark:text-surface-100">
            A member is invited
          </span>
          <span class="text-sm text-surface-500 dark:text-surface-400">
            A new member is invited to join the organization.
          </span>
        </label>
        <p-toggleswitch inputId="notifications-member-invited" formControlName="memberInvited" />
      </div>
    </div>
  </section>

  <div class="flex justify-end">
    <p-button
      type="submit"
      label="Save changes"
      icon="pi pi-check"
      [loading]="saving()"
      [disabled]="saving()"
    />
  </div>
</form>
