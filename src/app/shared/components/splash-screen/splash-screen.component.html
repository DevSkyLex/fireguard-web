@if (rendered()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center overflow-hidden bg-surface-0 transition-opacity duration-300 ease-out dark:bg-surface-950"
    [class.opacity-0]="hiding()"
    role="status"
    aria-live="polite"
  >
    <!-- Ambient brand halo — subtle on white, a touch warmer in the dark -->
    <div
      class="pointer-events-none absolute top-1/2 left-1/2 h-[28rem] w-[28rem] -translate-x-1/2 -translate-y-1/2 rounded-full bg-primary-500/5 blur-3xl dark:bg-primary-500/10"
      aria-hidden="true"
    ></div>

    <div class="relative flex flex-col items-center gap-10">
      <!-- Brand badge inside a circular progress ring -->
      <div class="relative flex size-36 items-center justify-center">
        <!-- Faint full track ring -->
        <svg
          class="absolute inset-0 size-full text-primary-500/15"
          viewBox="0 0 100 100"
          fill="none"
          aria-hidden="true"
        >
          <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="3" />
        </svg>

        @if (!stalled()) {
          <!-- Thin progress arc rotating around the badge -->
          <svg
            data-testid="boot-spinner"
            class="absolute inset-0 size-full origin-center animate-spin text-primary-500 [animation-duration:1.4s] motion-reduce:animate-none"
            viewBox="0 0 100 100"
            fill="none"
            aria-hidden="true"
          >
            <circle
              cx="50"
              cy="50"
              r="46"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-dasharray="80 289"
            />
          </svg>
        }

        <!-- Filled logo badge -->
        <div
          class="relative flex size-20 items-center justify-center rounded-full bg-primary-500 shadow-lg shadow-primary-500/30"
          aria-hidden="true"
        >
          <svg
            class="size-9 text-white"
            viewBox="0 0 24 24"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 2 C12.6 8 16 11.4 22 12 C16 12.6 12.6 16 12 22 C11.4 16 8 12.6 2 12 C8 11.4 11.4 8 12 2 Z"
            />
          </svg>
        </div>
      </div>

      <!-- Phase title + detail -->
      <div class="flex max-w-xs flex-col items-center gap-2 text-center">
        <span class="text-2xl font-semibold tracking-tight text-surface-950 dark:text-surface-50">
          {{ statusTitle() }}
        </span>
        <p class="text-sm leading-relaxed text-surface-500 dark:text-surface-400">
          {{ statusDetail() }}
        </p>
      </div>

      @if (stalled()) {
        <!-- Boot failed to settle — offer a way out -->
        <p-button
          label="Retry"
          icon="pi pi-refresh"
          size="small"
          severity="secondary"
          (onClick)="retry()"
        />
      }
    </div>
  </div>
}
