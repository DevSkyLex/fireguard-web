<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  title="Operational Flow"
  description="Inspection throughput and non-conformity pressure over time"
  [metrics]="summaryMetrics()"
  [loading]="isLoading()"
>
  <ng-template #action>
    <app-overview-toolbar
      [activeFilterCount]="activeFilterCount()"
      (filterToggle)="onFilterToggle()"
      (menuToggle)="onMenuToggle($event)"
    />
  </ng-template>

  <ng-template #content>
    <app-overview-chart />
  </ng-template>
</app-trend-card>

<app-trend-filter-drawer
  title="Operational Flow Filters"
  description="Refine the time window and comparison settings for the operational flow chart."
  [visible]="isFilterDrawerVisible()"
  [loading]="isLoading()"
  (cancel)="onCancelFilters()"
  (reset)="onResetFilters()"
  (apply)="onApplyFilters()"
>
  <app-overview-filters />
</app-trend-filter-drawer>
