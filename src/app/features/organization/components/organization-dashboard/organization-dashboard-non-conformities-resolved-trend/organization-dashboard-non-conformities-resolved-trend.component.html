<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-card title="Non-Conformities Resolved" description="Resolved non-conformities over time">
  <ng-template #action>
    <div class="flex items-center gap-2">
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-calendar"></i>
        </p-inputgroup-addon>
        <p-select
          [ngModel]="selectedGranularity()"
          (ngModelChange)="onGranularityChange($event)"
          [options]="granularityOptions"
          optionLabel="label"
          optionValue="value"
          [loading]="trendResource.isLoading()"
          size="small"
        />
      </p-inputgroup>

      <p-button
        icon="pi pi-ellipsis-v"
        severity="secondary"
        size="small"
        outlined
        (onClick)="onMenuToggle($event)"
      />
    </div>
  </ng-template>

  <ng-template #content>
    <div class="flex flex-col flex-1 min-h-[200px]">
      @if (trendResource.isLoading()) {
        <p-skeleton
          height="100%"
          class="w-full flex-1"
        />
      } @else {
        <p-chart
          type="bar"
          [data]="chartData()"
          [options]="chartOptions()"
          class="flex-1"
          height="100%"
          fluid
        />
      }
    </div>
  </ng-template>

  <ng-template #footer>
    <div class="flex flex-wrap items-center gap-2">
      <p-select
        [ngModel]="selectedNonConformityStatus()"
        (ngModelChange)="selectedNonConformityStatus.set($event)"
        [options]="nonConformityStatusOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Status"
        [showClear]="true"
        [loading]="trendResource.isLoading()"
        size="small"
      >
        <ng-template #item let-option>
          <span class="flex items-center gap-2">
            <i [class]="option.icon" [style.color]="option.color"></i>
            {{ option.label }}
          </span>
        </ng-template>
        <ng-template #selectedItem>
          @let option = selectedNonConformityStatusOption();
          @if (option) {
            <span class="flex items-center gap-2">
              <i [class]="option.icon" [style.color]="option.color"></i>
              {{ option.label }}
            </span>
          }
        </ng-template>
      </p-select>
      <p-select
        [ngModel]="selectedNonConformitySeverity()"
        (ngModelChange)="selectedNonConformitySeverity.set($event)"
        [options]="nonConformitySeverityOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Severity"
        [showClear]="true"
        [loading]="trendResource.isLoading()"
        size="small"
      >
        <ng-template #item let-option>
          <span class="flex items-center gap-2">
            <span class="inline-block w-2 h-2 rounded-full shrink-0" [style.background-color]="option.color"></span>
            {{ option.label }}
          </span>
        </ng-template>
        <ng-template #selectedItem>
          @let option = selectedSeverityOption();
          @if (option) {
            <span class="flex items-center gap-2">
              <span class="inline-block w-2 h-2 rounded-full shrink-0" [style.background-color]="option.color"></span>
              {{ option.label }}
            </span>
          }
        </ng-template>
      </p-select>
      @defer (on idle) {
        <p-datepicker
          selectionMode="range"
          [ngModel]="selectedDateRange()"
          [ngModelOptions]="{ updateOn: 'blur' }"
          (ngModelChange)="selectedDateRange.set($event)"
          placeholder="Select date range"
          [showClear]="true"
          [showTime]="true"
          hourFormat="24"
          size="small"
          appendTo="body"
          dateFormat="dd/mm/yy"
          [disabled]="trendResource.isLoading()"
        />
      }
      <p-togglebutton
        [ngModel]="compareEnabled()"
        (ngModelChange)="compareEnabled.set($event)"
        onLabel="Compare ON"
        offLabel="Compare OFF"
        size="small"
        [disabled]="trendResource.isLoading()"
      />
    </div>
  </ng-template>
</app-card>
