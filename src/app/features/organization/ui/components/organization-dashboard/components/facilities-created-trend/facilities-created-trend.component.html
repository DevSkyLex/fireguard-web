<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  title="Facilities Created"
  description="New facilities registered over time"
  [metrics]="summaryMetrics()"
  [loading]="isLoading()"
>
  <ng-template #action>
    <app-facilities-created-toolbar
      [activeFilterCount]="activeFilterCount()"
      (filterToggle)="onFilterToggle()"
      (menuToggle)="onMenuToggle($event)"
    />
  </ng-template>

  <ng-template #content>
    <app-facilities-created-chart />
  </ng-template>
</app-trend-card>

<app-trend-filter-drawer
  title="Facilities Created Filters"
  description="Refine facility creation metrics by type, period, and comparison mode."
  [visible]="isFilterDrawerVisible()"
  [loading]="isLoading()"
  (cancel)="onCancelFilters()"
  (reset)="onResetFilters()"
  (apply)="onApplyFilters()"
>
  <app-facilities-created-filters />
</app-trend-filter-drawer>
