<app-account-profile-form
  [profile]="userStore.profile()"
  [avatarUrl]="userStore.avatarUrlMedium()"
  [initials]="userStore.initials()"
  [saving]="editStore.isSaving()"
  [hasSaveError]="editStore.saveError() !== null"
  [hasAvatarError]="editStore.avatarError() !== null"
  (submitted)="save($event)"
  (avatarSelected)="uploadAvatar($event)"
/>
