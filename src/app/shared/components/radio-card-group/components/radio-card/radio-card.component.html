<label
  [for]="inputId()"
  class="flex items-start gap-3 rounded-lg border-2 p-3 transition-colors select-none"
  [class.cursor-pointer]="!disabled()"
  [class.cursor-not-allowed]="disabled()"
  [class.opacity-50]="disabled()"
  [class]="
    selectedValue() === value()
      ? 'border-primary bg-primary-50/40'
      : 'border-surface-200 dark:border-surface-800'
  "
>
  <div class="flex w-full flex-row items-start justify-between gap-2">
    <div class="flex min-w-0 flex-col gap-1 pt-0.5">
      <span class="text-sm leading-tight font-medium">{{ label() }}</span>

      @if (description(); as description) {
        <span class="text-xs leading-tight text-surface-500">{{ description }}</span>
      }
    </div>

    <p-radiobutton
      [inputId]="inputId()"
      [name]="name()"
      [value]="value()"
      [ngModel]="selectedValue()"
      (ngModelChange)="selected.emit($event)"
      [disabled]="disabled()"
    />
  </div>
</label>
