<ul class="max-h-60 overflow-auto">
  @for (org of organizations(); track org.id) {
    @let isActive = org.id === selectedOrganization()?.id;
    <li>
      <button
        pRipple
        type="button"
        class="flex items-center gap-2.5 w-full px-3 py-1.5 text-left transition-colors hover:bg-surface-50 dark:hover:bg-surface-800"
        (click)="organizationChange.emit(org)"
      >
        <p-avatar
          [label]="orgInitials(org.name)"
          [pt]="avatarPt(org)"
        />
        <span class="text-sm truncate flex-1" [class.font-medium]="isActive">{{ org.name }}</span>
        @if (isActive) {
          <i class="pi pi-check text-[11px] text-primary shrink-0"></i>
        }
      </button>
    </li>
  } @empty {
    <li class="px-3 py-2 text-sm text-surface-400 dark:text-surface-500">No workspaces found</li>
  }
</ul>
