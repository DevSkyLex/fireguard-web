@if (variant() === 'badge') {
  <span
    class="inline-flex h-7 w-fit items-center gap-1.5 rounded-full border border-surface-200 bg-surface-0 px-2.5 text-xs leading-none font-semibold text-surface-900 dark:border-surface-700 dark:bg-surface-900 dark:text-surface-100"
  >
    <i [class]="iconClass()" aria-hidden="true"></i>
    {{ descriptor().label }}
  </span>
} @else {
  <span class="flex items-center gap-2">
    <i [class]="iconClass()" aria-hidden="true"></i>
    {{ descriptor().label }}
  </span>
}
