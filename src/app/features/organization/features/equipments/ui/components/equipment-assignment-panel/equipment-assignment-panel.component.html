<section
  class="rounded-lg border border-surface-200 bg-surface-0 dark:border-surface-800 dark:bg-surface-950"
>
  <header
    class="flex items-center gap-2 border-b border-surface-200 px-4 py-3 dark:border-surface-800"
  >
    <i class="pi pi-building text-sm text-surface-500"></i>
    <h2 class="text-sm font-semibold text-surface-900 dark:text-surface-100">
      Facility assignment
    </h2>
  </header>
  <div class="p-4">
    <div
      class="mb-4 flex items-center gap-3 rounded-md bg-surface-50 px-3 py-2.5 dark:bg-surface-900"
    >
      <span
        class="flex size-8 items-center justify-center rounded-md bg-surface-100 dark:bg-surface-800"
      >
        <i class="pi pi-map-marker text-sm text-surface-500"></i>
      </span>
      <div class="min-w-0">
        <p class="text-xs text-surface-500">Current facility</p>
        <p class="truncate text-sm font-medium text-surface-900 dark:text-surface-100">
          {{ currentFacilityLabel() }}
        </p>
      </div>
    </div>
    @if (canManage()) {
      <div class="flex flex-col gap-2">
        <p-select
          [options]="[...options()]"
          [formControl]="control"
          optionLabel="label"
          optionValue="value"
          placeholder="Select a facility"
          class="w-full"
        />
        <div class="flex justify-end gap-2">
          @if (facilityId()) {
            <p-button
              label="Unassign"
              icon="pi pi-link-slash"
              severity="secondary"
              [outlined]="true"
              size="small"
              [loading]="loading()"
              (onClick)="unassign.emit()"
            />
          }
          <p-button
            label="Assign"
            icon="pi pi-link"
            size="small"
            [loading]="loading()"
            [disabled]="!control.value"
            (onClick)="control.value && assign.emit(control.value)"
          />
        </div>
      </div>
    }
  </div>
</section>
