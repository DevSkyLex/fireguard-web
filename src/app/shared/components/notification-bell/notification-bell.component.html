<!-- Bell trigger button -->
<app-notification-bell-trigger
  [hasUnread]="notificationStore.hasUnread()"
  (toggleMenu)="toggle($event)"
/>

<!-- Notification panel -->
<p-popover #popover [pt]="popoverPt">
  <div class="flex flex-col w-96">

    <app-notification-bell-header
      [hasUnread]="notificationStore.hasUnread()"
      [unreadCount]="notificationStore.unreadCount()"
    />

    <app-notification-bell-filter
      [selectedValue]="selectedFilter()"
      (filterChange)="applyFilter($event)"
    />

    <app-notification-bell-list
      [notifications]="notificationStore.notifications()"
      [loading]="notificationStore.isLoading()"
      [loadingMore]="notificationStore.isLoadingMore()"
      [hasMore]="notificationStore.hasMore()"
      (markAsRead)="markAsRead($event)"
      (loadMore)="loadMore()"
    />

    <app-notification-bell-footer
      [hasUnread]="notificationStore.hasUnread()"
      (markAllAsRead)="markAllAsRead()"
    />

  </div>
</p-popover>
