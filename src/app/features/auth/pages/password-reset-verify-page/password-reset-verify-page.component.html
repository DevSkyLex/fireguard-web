<div id="password-reset-verify-page" class="flex flex-col gap-6 w-full">
  <section class="flex flex-col">
    <h2 class="text-2xl font-semibold text-surface-900 mb-2">
      Verify Password Reset
    </h2>
    <p class="text-sm text-surface-600">
      Please enter the verification code sent to your email to
      proceed with resetting your password.
    </p>
  </section>

  <!-- OTP verification form -->
  <section class="flex flex-col">
    <app-otp-verification-form
      [loading]="loading()"
      [resendIn]="resendIn()"
      (submitted)="handleVerify($event)"
      (cancelled)="handleCancel()"
      (resend)="handleResend()"
    />
  </section>
</div>
