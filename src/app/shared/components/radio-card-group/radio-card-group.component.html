<div class="grid auto-rows-fr grid-cols-[repeat(auto-fit,minmax(min(100%,18rem),1fr))] gap-2">
  @for (option of options(); track option.value; let i = $index) {
    <app-radio-card
      class="h-full"
      [inputId]="uid + '-' + i"
      [name]="uid"
      [value]="option.value"
      [selectedValue]="value()"
      [label]="option.label"
      [description]="option.description"
      [icon]="option.icon"
      [disabled]="isDisabled()"
      (selected)="select($event)"
    />
  }
</div>
