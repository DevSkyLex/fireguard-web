name: Docker Image

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: docker-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30
    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Prepare image references
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_ref="${image_name}:sha-${SOURCE_SHA}"
          latest_ref="${image_name}:latest"

          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${latest_ref}" >> "$GITHUB_OUTPUT"

      - name: Prepare build configuration
        id: build_config
        shell: bash
        env:
          APP_API_URL: ${{ vars.APP_API_URL }}
          APP_MERCURE_HUB_URL: ${{ vars.APP_MERCURE_HUB_URL }}
          APP_NAME: ${{ vars.APP_NAME }}
          APP_MAINTENANCE: ${{ vars.APP_MAINTENANCE }}
        run: |
          optional_value() {
            local value
            value="$(printf '%s' "$1" | xargs)"

            case "${value,,}" in
              ''|'none'|'null')
                printf '%s' "$2"
                ;;
              *)
                printf '%s' "$value"
                ;;
            esac
          }

          echo "app_api_url=$(optional_value "$APP_API_URL" "http://localhost:8000")" >> "$GITHUB_OUTPUT"
          echo "app_mercure_hub_url=$(optional_value "$APP_MERCURE_HUB_URL" "http://localhost:3000/.well-known/mercure")" >> "$GITHUB_OUTPUT"
          echo "app_name=$(optional_value "$APP_NAME" "Fireguard")" >> "$GITHUB_OUTPUT"
          echo "app_maintenance=$(optional_value "$APP_MAINTENANCE" "false")" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.latest_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_API_URL=${{ steps.build_config.outputs.app_api_url }}
            APP_MERCURE_HUB_URL=${{ steps.build_config.outputs.app_mercure_hub_url }}
            APP_NAME=${{ steps.build_config.outputs.app_name }}
            APP_MAINTENANCE=${{ steps.build_config.outputs.app_maintenance }}

      - name: Trigger VPS deployment
        if: github.event_name == 'workflow_run' || github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: gh workflow run deploy-vps.yml --repo "$GITHUB_REPOSITORY" --ref main -f image_ref="$IMAGE_REF"
