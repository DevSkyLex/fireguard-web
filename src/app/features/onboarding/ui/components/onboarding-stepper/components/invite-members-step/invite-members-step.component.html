<p-card [pt]="cardPt">
  <ng-template #header>
    <div class="flex items-start gap-4 px-6 pt-6 pb-5">
      <div
        class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-primary/10 dark:bg-primary/15"
      >
        <i class="pi pi-users text-base text-primary"></i>
      </div>
      <div class="min-w-0 flex-1">
        @if (!step().required) {
          <p-tag
            value="Optional"
            i18n-value="@@common.optionalTag"
            severity="secondary"
            [rounded]="true"
            styleClass="mb-1.5"
          />
        }
        <h2
          class="text-xl font-semibold tracking-tight text-balance text-surface-900 dark:text-surface-0"
          i18n="@@onboarding.members.title"
        >
          Team &amp; technicians
        </h2>
        <p
          class="mt-1 text-sm leading-relaxed text-surface-500 dark:text-surface-400"
          i18n="@@onboarding.members.subtitle"
        >
          Invite your first team members to start collaborating.
        </p>
      </div>
    </div>
  </ng-template>

  <div class="px-6 py-6">
    <app-invite-members-form
      [roles]="roles()"
      [rolesLoading]="rolesLoading()"
      [inviting]="isInviting()"
      [executing]="isExecuting()"
      [skippable]="step().skipAvailable"
      [busy]="anyBusy()"
      (invited)="handleInvite($event)"
      (completed)="handleComplete()"
      (skipped)="handleSkip()"
    />
  </div>
</p-card>
