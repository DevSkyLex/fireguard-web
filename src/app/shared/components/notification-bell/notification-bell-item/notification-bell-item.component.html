<li
  class="flex gap-3 px-4 py-3 cursor-default transition-colors hover:bg-surface-50"
  [class.bg-primary-50]="!notification().isRead"
>

  <!-- Category icon -->
  <span
    class="flex items-center justify-center w-7 h-7 rounded-full shrink-0 text-sm mt-0.5"
    [class]="iconBg() + ' ' + iconText()"
    [title]="notification().type"
  >
    <i class="pi text-xs" [class]="icon()"></i>
  </span>

  <!-- Content -->
  <div class="flex-1 min-w-0 flex flex-col gap-0.5">
    <p class="text-sm font-medium text-surface-900 truncate" [title]="notification().subject">
      {{ notification().subject }}
    </p>
    <p class="text-xs text-surface-500 line-clamp-2">{{ notification().body }}</p>
    <span class="text-xs text-surface-400 mt-0.5">
      {{ notification().createdAt | date: 'short' }}
    </span>
  </div>

  <!-- Unread dot -->
  @if (!notification().isRead) {
    <button
      type="button"
      class="w-2 h-2 rounded-full bg-primary shrink-0 mt-2 hover:scale-125 transition-transform cursor-pointer"
      title="Mark as read"
      (click)="onMarkAsRead($event)"
    ></button>
  }

</li>
