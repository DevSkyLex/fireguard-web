<div
  id="dashboard-layout"
  class="flex h-dvh overflow-hidden bg-surface-0 transition-colors dark:bg-surface-950"
>
  <!-- Primary sidebar: full-height on the left, integrates with header line -->
  <aside
    class="hidden shrink-0 overflow-y-auto border-r border-surface-200 bg-surface-0 transition-[width] duration-200 ease-in-out lg:flex dark:border-surface-800 dark:bg-surface-950"
    [style.width.px]="primaryIconOnly() ? 64 : 300"
  >
    <app-dashboard-layout-sidebar
      class="w-full"
      variant="primary"
      [iconOnly]="primaryIconOnly()"
      [collapsible]="isDesktopSidebar()"
    />
  </aside>

  <!-- Right column: header on top, then context panel + main content -->
  <div class="flex min-w-0 flex-1 flex-col overflow-hidden">
    <!-- Header: only spans the right column, aligned with the sidebar brand -->
    <app-dashboard-layout-header />

    <!-- Body: context panel + main content -->
    <div class="flex min-h-0 flex-1 overflow-hidden">
      <!-- Context panel: visible only when a contribution is active, resizable -->
      @if (hasActiveContextPanel()) {
        <div
          class="relative hidden shrink-0 lg:flex"
          [style.width.px]="sidebarService.width()"
          [style.transition]="sidebarService.isResizing() ? 'none' : 'width 200ms ease'"
        >
          <aside
            class="h-full w-full overflow-y-auto border-r border-surface-200 bg-surface-50/50 transition-colors dark:border-surface-800 dark:bg-surface-900/40"
          >
            <app-dashboard-layout-context-panel class="w-full" />
          </aside>

          <button
            type="button"
            class="absolute top-1/2 right-0 z-10 flex h-15 w-3 translate-x-1/2 -translate-y-1/2 cursor-col-resize items-center justify-center rounded-sm border border-surface-200 bg-surface-0 transition-colors hover:bg-surface-50 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary active:bg-surface-100 dark:border-surface-800 dark:bg-surface-950 dark:hover:bg-surface-900 dark:active:bg-surface-800"
            role="separator"
            aria-label="Resize sidebar"
            aria-orientation="vertical"
            [attr.aria-valuemin]="0"
            [attr.aria-valuemax]="sidebarService.maxWidth()"
            [attr.aria-valuenow]="sidebarService.width()"
            appDashboardSidebarResizeHandle
            pRipple
          >
            <i class="pi pi-ellipsis-v text-xs text-surface-400"></i>
          </button>
        </div>
      }

      <!-- Mobile drawer: merged navigation (primary + organization section when active) -->
      <p-drawer
        [visible]="sidebarService.visible()"
        (visibleChange)="sidebarService.setVisible($event)"
        [blockScroll]="true"
      >
        <ng-template #headless>
          <app-dashboard-layout-sidebar />
        </ng-template>
      </p-drawer>

      <!-- Main area -->
      <div class="min-w-0 flex-1 overflow-y-auto bg-surface-50 dark:bg-surface-900">
        <app-dashboard-layout-content>
          <router-outlet />
        </app-dashboard-layout-content>
      </div>
    </div>
  </div>
</div>
