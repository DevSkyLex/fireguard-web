<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex w-full flex-col gap-8">
  <section class="flex flex-col gap-3" aria-labelledby="intervention-objective-heading">
    <div>
      <h2
        id="intervention-objective-heading"
        i18n="@@intervention.cf.objective"
        class="text-lg font-semibold text-surface-900 dark:text-surface-100"
      >
        Objective
      </h2>
      <p
        i18n="@@intervention.cf.objectiveHint"
        class="mt-0.5 text-sm text-surface-500 dark:text-surface-400"
      >
        Choose what this intervention prepares. It drives the field workflow.
      </p>
    </div>
    <app-radio-card-group formControlName="type" [options]="interventionTypes" />
  </section>

  <section class="flex flex-col gap-5" aria-labelledby="intervention-details-heading">
    <div>
      <h2
        id="intervention-details-heading"
        i18n="@@intervention.cf.details"
        class="text-lg font-semibold text-surface-900 dark:text-surface-100"
      >
        Details
      </h2>
      <p
        i18n="@@intervention.cf.detailsHint"
        class="mt-0.5 text-sm text-surface-500 dark:text-surface-400"
      >
        Only a name is required to start a draft — site, assignment and schedule can be completed
        now or later in the Prepare step.
      </p>
    </div>

    <div class="grid gap-5 md:grid-cols-2">
      <label class="grid gap-1.5 text-sm md:col-span-2">
        <span i18n="@@intervention.cf.name" class="font-medium"
          >Intervention name <span class="text-red-500" aria-hidden="true">*</span></span
        >
        <input
          pInputText
          formControlName="name"
          i18n-placeholder="@@intervention.cf.namePlaceholder"
          placeholder="e.g. Q3 warehouse inspection"
          autocomplete="off"
          class="w-full"
          [invalid]="form.controls.name.invalid && form.controls.name.touched"
        />
        @if (form.controls.name.invalid && form.controls.name.touched) {
          <p-message severity="error" variant="simple">
            @if (form.controls.name.hasError('required')) {
              <span i18n="@@intervention.cf.nameRequired"
                >A name is required to start the draft.</span
              >
            } @else {
              <span i18n="@@intervention.cf.nameLength">Use between 2 and 255 characters.</span>
            }
          </p-message>
        }
      </label>

      <label class="grid gap-1.5 text-sm md:col-span-2">
        <span i18n="@@intervention.cf.priority" class="font-medium"
          >Priority <span class="text-red-500" aria-hidden="true">*</span></span
        >
        <p-select
          formControlName="priority"
          [options]="[...priorityOptions]"
          optionLabel="label"
          optionValue="value"
          appendTo="body"
          [invalid]="form.controls.priority.invalid && form.controls.priority.touched"
        >
          <ng-template #selectedItem let-option>
            @if (option) {
              <app-intervention-option kind="priority" [value]="option.value" />
            }
          </ng-template>
          <ng-template #item let-option>
            <app-intervention-option kind="priority" [value]="option.value" />
          </ng-template>
        </p-select>
        @if (form.controls.priority.invalid && form.controls.priority.touched) {
          <p-message severity="error" variant="simple">
            <span i18n="@@intervention.cf.priorityRequired">A priority is required.</span>
          </p-message>
        }
      </label>

      <label class="grid gap-1.5 text-sm">
        <span i18n="@@intervention.cf.site" class="font-medium">Site</span>
        <p-select
          formControlName="site"
          [options]="[...siteOptions()]"
          optionLabel="label"
          optionValue="value"
          [filter]="true"
          [loading]="optionsLoading()"
          [showClear]="true"
          i18n-placeholder="@@intervention.cf.sitePlaceholder"
          placeholder="Select a site"
          appendTo="body"
        />
      </label>

      <label class="grid gap-1.5 text-sm">
        <span i18n="@@intervention.cf.responsible" class="font-medium">Responsible agent</span>
        <p-select
          formControlName="responsible"
          [options]="[...memberOptions()]"
          optionLabel="label"
          optionValue="value"
          [filter]="true"
          filterBy="label,roleLabel"
          [loading]="optionsLoading()"
          [showClear]="true"
          i18n-placeholder="@@intervention.cf.responsiblePlaceholder"
          placeholder="Assign an agent"
          appendTo="body"
        >
          <ng-template #item let-option>
            <app-intervention-member-option [option]="option" />
          </ng-template>
          <ng-template #selectedItem let-option>
            @if (option) {
              <app-intervention-member-option [option]="option" [compact]="true" />
            }
          </ng-template>
        </p-select>
      </label>

      <label class="grid gap-1.5 text-sm md:col-span-2">
        <span i18n="@@intervention.cf.participants" class="font-medium">Participants</span>
        <p-multiselect
          formControlName="participants"
          [options]="[...memberOptions()]"
          optionLabel="label"
          optionValue="value"
          [filter]="true"
          filterBy="label,roleLabel"
          [loading]="optionsLoading()"
          display="chip"
          i18n-placeholder="@@intervention.cf.participantsPlaceholder"
          placeholder="Add field participants"
          appendTo="body"
        >
          <ng-template #item let-option>
            <app-intervention-member-option [option]="option" />
          </ng-template>
        </p-multiselect>
      </label>

      <label class="grid gap-1.5 text-sm">
        <span i18n="@@intervention.cf.plannedStart" class="font-medium">Planned start</span>
        <p-datepicker
          formControlName="plannedStartAt"
          [showTime]="true"
          hourFormat="24"
          [showIcon]="true"
          [showClear]="true"
          [showButtonBar]="true"
          appendTo="body"
          dateFormat="yy-mm-dd"
          i18n-placeholder="@@intervention.cf.startPlaceholder"
          placeholder="Select start date and time"
          class="w-full"
        />
      </label>

      <label class="grid gap-1.5 text-sm">
        <span i18n="@@intervention.cf.due" class="font-medium">Due</span>
        <p-datepicker
          formControlName="dueAt"
          [showTime]="true"
          hourFormat="24"
          [showIcon]="true"
          [showClear]="true"
          [showButtonBar]="true"
          [minDate]="form.controls.plannedStartAt.value ?? undefined"
          appendTo="body"
          dateFormat="yy-mm-dd"
          i18n-placeholder="@@intervention.cf.duePlaceholder"
          placeholder="Select due date and time"
          class="w-full"
        />
      </label>
    </div>
  </section>

  <div class="sticky bottom-0 -mb-2 bg-surface-0 pt-4 pb-2 dark:bg-surface-900">
    <p-button
      i18n-label="@@intervention.cf.submit"
      label="Create draft intervention"
      type="submit"
      [fluid]="true"
      [loading]="loading()"
      [disabled]="form.invalid || loading()"
    />
  </div>
</form>
