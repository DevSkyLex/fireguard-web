<section
  class="flex min-h-0 flex-1 flex-col rounded-lg border border-surface-200 bg-surface-0 dark:border-surface-800 dark:bg-surface-950"
>
  <header
    class="flex items-center justify-between border-b border-surface-200 px-4 py-3 dark:border-surface-800"
  >
    <div class="flex items-center gap-2">
      <i class="pi pi-wrench text-sm text-surface-500"></i>
      <h2
        class="text-sm font-semibold text-surface-900 dark:text-surface-100"
        i18n="@@equipment.maint.title"
      >
        Maintenance history
      </h2>
    </div>
    <span class="text-xs text-surface-500" i18n="@@equipment.maint.eventCount"
      >{{ logs().length }} event(s)</span
    >
  </header>
  <p-table [value]="loading() ? skeletonItems : [...logs()]" dataKey="id" [stripedRows]="true">
    <ng-template pTemplate="header">
      <tr>
        <th i18n="@@equipment.maint.colStarted">Started</th>
        <th i18n="@@equipment.maint.colCompleted">Completed</th>
        <th i18n="@@common.status">Status</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-log>
      @if (loading()) {
        <tr>
          <td><p-skeleton width="8rem" /></td>
          <td><p-skeleton width="8rem" /></td>
          <td><p-skeleton width="6rem" height="1.75rem" borderRadius="999px" /></td>
        </tr>
      } @else {
        <tr>
          <td>{{ log.startedAt | date: 'medium' }}</td>
          <td>
            @if (log.completedAt) {
              {{ log.completedAt | date: 'medium' }}
            } @else {
              <ng-container i18n="@@equipment.maint.inProgress">In progress</ng-container>
            }
          </td>
          <td>
            @if (log.completedAt) {
              <p-tag
                value="Completed"
                i18n-value="@@equipment.maint.completed"
                severity="success"
              />
            } @else {
              <p-tag value="Active" i18n-value="@@equipment.maint.active" severity="warn" />
            }
          </td>
        </tr>
      }
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr class="bg-transparent! [&>td]:border-b-0!">
        <td colspan="3">
          <app-empty-state
            icon="pi-wrench"
            title="No maintenance history"
            i18n-title="@@equipment.maint.emptyTitle"
            description="Lifecycle maintenance events will appear here."
            i18n-description="@@equipment.maint.emptyDesc"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>
