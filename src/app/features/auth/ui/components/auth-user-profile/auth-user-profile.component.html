<section class="flex flex-col" data-testid="auth-user-profile">
  @if (userIdentityPort.isLoading()) {
    <div
      class="flex items-center gap-3 p-4"
      data-testid="auth-user-profile-skeleton"
      aria-busy="true"
    >
      <p-skeleton shape="circle" size="2rem" />

      <div class="min-w-0 flex-1 space-y-2">
        <p-skeleton width="8rem" height="0.875rem" />
        <p-skeleton width="11rem" height="0.75rem" />
      </div>
    </div>
  } @else {
    <p-panel
      #userProfilePanel
      [toggleable]="true"
      toggler="header"
      collapsed
      [motionOptions]="panelMotionOptions"
      [unstyled]="true"
      [pt]="panelPt"
      data-testid="auth-user-profile-panel"
    >
      <ng-template #header>
        <div
          class="flex w-full cursor-pointer items-center gap-3 p-4 text-left transition-colors hover:bg-surface-50 dark:hover:bg-surface-800"
          data-testid="auth-user-profile-trigger"
        >
          @if (userIdentityPort.avatarUrlSmall(); as avatarUrl) {
            <p-avatar
              [image]="avatarUrl"
              [ariaLabel]="(userIdentityPort.displayName() ?? 'User') + ' avatar'"
              shape="circle"
              size="normal"
            />
          } @else {
            <p-avatar
              [label]="userIdentityPort.initials() ?? '?'"
              shape="circle"
              size="normal"
              class="text-base"
            />
          }

          <div class="min-w-0 flex-1">
            <p
              class="truncate text-sm font-semibold text-surface-900 transition-colors dark:text-surface-100"
              data-testid="auth-user-profile-name"
            >
              {{ userIdentityPort.displayName() ?? 'User' }}
            </p>
            <p
              class="truncate text-xs text-surface-500 transition-colors dark:text-surface-400"
              data-testid="auth-user-profile-email"
            >
              {{ userIdentityPort.profile()?.email ?? 'No email' }}
            </p>
          </div>

          <i
            class="pi text-xs text-surface-500 transition-colors dark:text-surface-400"
            [class.pi-chevron-up]="!userProfilePanel.collapsed"
            [class.pi-chevron-down]="userProfilePanel.collapsed"
            aria-hidden="true"
          ></i>
        </div>
      </ng-template>

      <div data-testid="auth-user-profile-menu">
        <a
          routerLink="/organization/settings"
          class="flex w-full cursor-pointer items-center gap-3 rounded-lg p-3 text-surface-800 transition-colors hover:bg-surface-50 dark:text-surface-200 dark:hover:bg-surface-800"
          data-testid="auth-user-profile-settings"
        >
          <i class="pi pi-cog text-base text-surface-500 dark:text-surface-400"></i>
          <span class="flex-1 text-sm font-medium text-surface-700 dark:text-surface-300"
            >Settings</span
          >
        </a>

        <button
          type="button"
          class="flex w-full cursor-pointer items-center gap-3 rounded-lg p-3 text-surface-800 transition-colors hover:bg-surface-50 disabled:cursor-not-allowed disabled:opacity-60 dark:text-surface-200 dark:hover:bg-surface-800"
          data-testid="auth-user-profile-logout"
          [disabled]="authStore.isLoggingOut()"
          (click)="onLogout()"
        >
          <i class="pi pi-sign-out text-base text-surface-500 dark:text-surface-400"></i>
          <span class="flex-1 text-left text-sm font-medium text-surface-700 dark:text-surface-300">
            {{ authStore.isLoggingOut() ? 'Logging out...' : 'Logout' }}
          </span>
        </button>
      </div>
    </p-panel>
  }
</section>
