<p-card
  styleClass="rounded-[1rem] border border-surface-200 bg-surface-0 shadow-none dark:border-surface-800 dark:bg-surface-900"
>
  <div class="flex flex-wrap items-center justify-between gap-4 border-b border-surface-200 pb-5 dark:border-surface-800">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-surface-400 dark:text-surface-500">
        Operations pulse
      </p>
      <h2 class="mt-1 text-xl font-semibold tracking-tight text-surface-900 dark:text-surface-0">
        Organization overview
      </h2>
      <p class="mt-2 text-sm text-surface-500 dark:text-surface-400">
        Current volume against active and resolved capacity.
      </p>
    </div>

    <p-selectbutton
      [options]="selectOptions()"
      [ngModel]="activeFilter()"
      (ngModelChange)="filterChange.emit($event)"
      optionLabel="label"
      optionValue="value"
      [allowEmpty]="false"
      size="small"
    />
  </div>

  @if (hasData()) {
    <div class="h-[22rem] pt-4">
      <p-chart
        type="line"
        [data]="chartData()"
        [options]="chartOptions()"
        ariaLabel="Organization operations pulse"
        class="block h-full"
      />
    </div>
  } @else {
    <div class="flex h-[22rem] items-center justify-center pt-4">
      <p-skeleton width="100%" height="100%" borderRadius="0.875rem" />
    </div>
  }

  <div class="mt-5 grid gap-3 border-t border-surface-200 pt-5 sm:grid-cols-2 xl:grid-cols-5 dark:border-surface-800">
    @for (readout of readouts(); track readout.label) {
      <div class="rounded-lg bg-surface-50 px-4 py-4 dark:bg-surface-800">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-surface-400 dark:text-surface-500">
          {{ readout.label }}
        </p>
        <p class="mt-2 text-xl font-semibold text-surface-900 dark:text-surface-0">
          {{ readout.value }}
        </p>
        <p class="mt-1 text-sm text-surface-500 dark:text-surface-400">
          {{ readout.helper }}
        </p>
      </div>
    }
  </div>
</p-card>
