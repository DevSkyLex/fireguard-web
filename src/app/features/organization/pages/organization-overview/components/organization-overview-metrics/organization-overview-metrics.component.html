@if (showSkeleton()) {
  @for (_ of [1, 2, 3]; track $index) {
    <p-card
      class="xl:col-span-4"
      styleClass="h-full rounded-[0.875rem] border border-surface-200 bg-surface-0 shadow-none dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex items-center justify-between">
        <p-skeleton width="7rem" height="0.8rem" />
        <p-skeleton width="4rem" height="1.5rem" />
      </div>
      <div class="mt-5">
        <p-skeleton width="5rem" height="2.4rem" />
      </div>
      <div class="mt-3">
        <p-skeleton width="11rem" height="0.8rem" />
      </div>
    </p-card>
  }
} @else {
  @for (metric of metrics(); track metric.label) {
    <p-card
      class="xl:col-span-4"
      styleClass="h-full rounded-[0.875rem] border border-surface-200 bg-surface-0 shadow-none dark:border-surface-800 dark:bg-surface-900"
    >
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.22em] text-surface-400 dark:text-surface-500">
            {{ metric.label }}
          </p>
          <p class="mt-4 text-4xl font-semibold tracking-tight text-surface-900 dark:text-surface-0">
            {{ metric.value }}
          </p>
        </div>

        <p-tag
          [value]="metric.badgeLabel"
          [severity]="metric.badgeSeverity"
          [rounded]="true"
        />
      </div>

      <p class="mt-4 text-sm leading-6 text-surface-500 dark:text-surface-400">
        {{ metric.helper }}
      </p>
    </p-card>
  }
}
