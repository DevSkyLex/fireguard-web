@if (iconOnly()) {
  <div
    class="flex h-16 items-center justify-center border-b border-surface-200 px-3 dark:border-surface-800"
  >
    @if (collapsible()) {
      <button
        type="button"
        class="flex size-9 items-center justify-center rounded-md text-primary-500 transition-colors hover:bg-surface-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary dark:hover:bg-surface-900"
        pTooltip="Expand sidebar"
        i18n-pTooltip="@@layout.sidebar.expand"
        tooltipPosition="right"
        aria-label="Expand sidebar"
        i18n-aria-label="@@layout.sidebar.expand"
        (click)="sidebarService.togglePrimaryCollapsed()"
      >
        <svg
          class="size-7"
          viewBox="0 0 24 24"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M12 2 C12.6 8 16 11.4 22 12 C16 12.6 12.6 16 12 22 C11.4 16 8 12.6 2 12 C8 11.4 11.4 8 12 2 Z"
          />
        </svg>
      </button>
    } @else {
      <svg
        class="size-7 text-primary-500"
        viewBox="0 0 24 24"
        fill="currentColor"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          d="M12 2 C12.6 8 16 11.4 22 12 C16 12.6 12.6 16 12 22 C11.4 16 8 12.6 2 12 C8 11.4 11.4 8 12 2 Z"
        />
      </svg>
    }
  </div>
} @else {
  <div
    class="flex h-16 items-center gap-2 border-b border-surface-200 px-5 dark:border-surface-800"
  >
    <svg
      class="size-6 shrink-0 text-primary-500"
      viewBox="0 0 24 24"
      fill="currentColor"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <path
        d="M12 2 C12.6 8 16 11.4 22 12 C16 12.6 12.6 16 12 22 C11.4 16 8 12.6 2 12 C8 11.4 11.4 8 12 2 Z"
      />
    </svg>

    <p
      class="min-w-0 flex-1 truncate text-[17px] font-bold tracking-tight text-surface-950 dark:text-surface-50"
    >
      Fireguard
    </p>

    @if (collapsible()) {
      <button
        type="button"
        class="flex size-7 shrink-0 items-center justify-center rounded-md border border-surface-200 text-surface-500 transition-colors hover:bg-surface-100 hover:text-surface-700 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary dark:border-surface-800 dark:text-surface-400 dark:hover:bg-surface-900 dark:hover:text-surface-200"
        pTooltip="Collapse sidebar"
        i18n-pTooltip="@@layout.sidebar.collapse"
        tooltipPosition="right"
        aria-label="Collapse sidebar"
        i18n-aria-label="@@layout.sidebar.collapse"
        (click)="sidebarService.togglePrimaryCollapsed()"
      >
        <i class="pi pi-arrow-left text-[10px]"></i>
      </button>
    }
  </div>
}
