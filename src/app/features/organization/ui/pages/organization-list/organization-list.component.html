<div id="organization-list" class="flex h-full flex-col gap-6">
  <section class="flex flex-row flex-wrap items-stretch gap-6">
    <app-organization-count-metric class="min-w-56 flex-1" />
    <app-organization-active-metric class="min-w-56 flex-1" />
    <app-organization-members-metric class="min-w-56 flex-1" />
  </section>

  <app-organization-dataview
    class="flex min-h-0 flex-1 flex-col"
    [organizations]="store.organizations()"
    [total]="store.totalOrganizations()"
    [loading]="store.isLoadingOrganizations()"
    [deleting]="store.isDeleting()"
    [initialPage]="page()"
    (load)="onLoad($event)"
    (pageChange)="onPageChange($event)"
    (view)="onView($event)"
    (add)="onAdd()"
    (delete)="onDelete($event)"
  />
</div>
