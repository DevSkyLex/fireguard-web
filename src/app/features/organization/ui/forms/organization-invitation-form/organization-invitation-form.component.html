<form [formGroup]="form" (ngSubmit)="submit()" class="grid gap-3 md:grid-cols-[2fr_1fr_auto]">
  <input pInputText type="email" formControlName="email" placeholder="member@example.com" />
  <p-select
    [options]="[...roles()]"
    optionLabel="name"
    optionValue="id"
    formControlName="roleId"
    placeholder="Initial role"
    [showClear]="true"
  />
  <p-button
    type="submit"
    label="Send invitation"
    icon="pi pi-send"
    [loading]="loading()"
    [disabled]="form.invalid || loading()"
  />
</form>
