<p-card
  styleClass="rounded-[1rem] border border-surface-200 bg-surface-0 shadow-[0_24px_70px_-40px_rgba(15,23,42,0.24)] dark:border-surface-800 dark:bg-surface-900"
>
  <div class="flex flex-col gap-6 xl:flex-row xl:items-center xl:justify-between">
    <div class="flex items-start gap-4">
      <p-avatar
        [label]="organization().name.charAt(0).toUpperCase()"
        shape="circle"
        size="xlarge"
        [style.background-color]="'var(--p-primary-color)'"
        [style.color]="'var(--p-primary-contrast-color)'"
        [style.font-weight]="'700'"
      />

      <div class="min-w-0">
        <div class="flex flex-wrap items-center gap-2">
          <p-tag value="Control room" severity="contrast" [rounded]="true" />
          <p-tag
            [value]="organization().isActive ? 'Active' : 'Inactive'"
            [severity]="organization().isActive ? 'success' : 'danger'"
            [rounded]="true"
          />
        </div>

        <h1 class="mt-4 text-3xl font-semibold tracking-tight text-surface-900 dark:text-surface-0 md:text-4xl">
          {{ organization().name }}
        </h1>

        <p class="mt-3 max-w-3xl text-sm leading-7 text-surface-500 dark:text-surface-400">
          Your operational briefing across facilities, assets, inspections, and compliance.
        </p>
      </div>
    </div>

    <div class="flex flex-col items-stretch gap-3 xl:min-w-[22rem]">
      <p-selectbutton
        [options]="selectOptions()"
        [ngModel]="activeMode()"
        (ngModelChange)="modeChange.emit($event)"
        optionLabel="label"
        optionValue="value"
        [allowEmpty]="false"
        size="small"
      />

      <p-button
        [label]="snapshotDateLabel()"
        icon="pi pi-calendar"
        severity="secondary"
        [outlined]="true"
        size="small"
        styleClass="!justify-start !rounded-full"
      />
    </div>
  </div>
</p-card>
