<div id="inspection-list" class="flex flex-col">
  <section
    class="flex flex-col gap-2 border-b border-surface-200 bg-surface-50 p-8 dark:border-surface-800 dark:bg-surface-900"
  >
    <div class="flex flex-col justify-between">
      <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-100">Inspections</h1>
      <p class="text-sm text-surface-700 dark:text-surface-300">
        Manage inspections for this organization.
      </p>
    </div>
  </section>

  <section class="">
    <app-inspection-table
      class="flex h-full flex-col"
      [inspections]="store.inspections()"
      [total]="store.totalInspections()"
      [loading]="store.isLoadingInspections()"
      [empty]="store.isEmpty()"
      [initialPage]="page()"
      (load)="onLoad($event)"
      (pageChange)="onPageChange($event)"
      (add)="onAdd()"
    />
  </section>
</div>
