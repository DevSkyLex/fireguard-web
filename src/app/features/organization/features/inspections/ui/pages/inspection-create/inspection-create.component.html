<div id="inspection-create" class="grid grid-rows-[auto_1fr] h-full">
  <section class="flex flex-col gap-2 p-8 bg-surface-50 dark:bg-surface-900 border-b border-surface-200 dark:border-surface-800">
    <div class="flex flex-col justify-between">
      <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-100">New Inspection</h1>
      <p class="text-sm text-surface-700 dark:text-surface-300">Create a new inspection for this organization.</p>
    </div>
  </section>

  <section class="p-8 max-w-2xl">
    <app-inspection-form
      [loading]="store.isCreating()"
      [equipments]="equipmentStore.equipmentList()"
      [facilities]="facilityStore.facilities()"
      [checklists]="checklistStore.checklists()"
      (submitted)="handleSubmit($event)"
      (cancelled)="handleCancel()"
    />
  </section>
</div>
