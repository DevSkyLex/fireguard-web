<aside class="flex h-dvh w-full flex-col bg-surface-0 text-surface-900">
  <div class="flex items-center gap-3 px-4 py-5">
    <span class="text-2xl font-semibold tracking-tight text-surface-900">Fireguard</span>
  </div>

  <nav class="flex-1 overflow-y-auto px-5 pb-4">
    @for (group of menuGroups; track group.id) {
      @if (group.dividerBefore) {
        <p-divider class="!my-4 !border-surface-200"/>
      }

      <p-panelmenu
        [model]="group.items"
        [multiple]="true"
        [motionOptions]="panelMenuMotionOptions"
        [unstyled]="true"
        [pt]="panelMenuPt"
        class="w-full"
      >
        <ng-template #item let-item>
          <a pRipple class="flex w-full cursor-pointer items-center gap-3 rounded-lg px-4 py-3 text-surface-800 transition-colors hover:bg-surface-50">
            @if (item.icon) {
              <i [class]="item.icon + ' text-base text-surface-500'"></i>
            }

            <span [class]="item.icon ? 'flex-1 text-sm font-medium text-surface-700' : 'flex-1 text-base font-semibold text-surface-900'">
              {{ item.label }}
            </span>

            @if (item.badge) {
              <p-badge
                [value]="item.badge"
                severity="contrast"
                size="small"
              />
            }

            @if (item.items?.length) {
              <i class="pi text-xs text-surface-500"
                [class.pi-chevron-down]="item.expanded"
                [class.pi-chevron-right]="!item.expanded"
              ></i>
            }
          </a>
        </ng-template>
      </p-panelmenu>
    }
  </nav>
</aside>
