<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex h-full flex-col gap-5">
  <p class="text-sm text-surface-600 dark:text-surface-300">
    Record work that was not part of the prepared scope. It will be highlighted during review.
  </p>

  <label class="grid gap-1.5 text-sm font-medium">
    Action
    <p-select
      formControlName="action"
      [options]="[...actionOptions]"
      optionLabel="label"
      optionValue="value"
    >
      <ng-template #selectedItem let-option>
        @if (option) {
          <app-intervention-option kind="workItemAction" [value]="option.value" />
        }
      </ng-template>
      <ng-template #item let-option>
        <app-intervention-option kind="workItemAction" [value]="option.value" />
      </ng-template>
    </p-select>
  </label>

  <label class="grid gap-1.5 text-sm font-medium">
    <span>
      {{
        form.controls.action.value === 'site_setup'
          ? 'Facility name'
          : form.controls.action.value === 'inventory'
            ? 'Equipment type'
            : 'Equipment resource'
      }}
      <span class="text-red-500" aria-hidden="true">*</span>
    </span>
    <input
      pInputText
      formControlName="target"
      class="w-full"
      [invalid]="form.controls.target.invalid && form.controls.target.touched"
      [placeholder]="
        form.controls.action.value === 'site_setup'
          ? 'Example: Electrical room'
          : form.controls.action.value === 'inventory'
            ? 'Example: fire_extinguisher'
            : '/api/equipment/...'
      "
    />
    @if (form.controls.target.invalid && form.controls.target.touched) {
      <small class="flex items-center gap-1 font-normal text-red-600 dark:text-red-400">
        <i class="pi pi-exclamation-circle text-[0.7rem]" aria-hidden="true"></i>
        Describe the discovered resource.
      </small>
    }
  </label>

  @if (form.controls.action.value === 'inspection') {
    <label class="grid gap-1.5 text-sm font-medium">
      Initial result
      <p-select
        formControlName="result"
        [options]="[...resultOptions]"
        optionLabel="label"
        optionValue="value"
      >
        <ng-template #selectedItem let-option>
          @if (option) {
            <app-intervention-option kind="inspectionResult" [value]="option.value" />
          }
        </ng-template>
        <ng-template #item let-option>
          <app-intervention-option kind="inspectionResult" [value]="option.value" />
        </ng-template>
      </p-select>
    </label>
  }

  <p-button
    class="mt-auto"
    styleClass="w-full"
    label="Add discovery"
    type="submit"
    icon="pi pi-plus"
    [loading]="loading()"
    [disabled]="form.invalid || disabled() || loading()"
  />
</form>
