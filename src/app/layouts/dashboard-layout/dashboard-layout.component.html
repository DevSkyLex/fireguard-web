<div id="dashboard-layout" class="flex min-h-dvh bg-surface-0 dark:bg-surface-950 transition-colors">
  <!-- Desktop sidebar (resizable) -->
  <aside class="hidden lg:flex shrink-0 border-r border-surface-200 dark:border-surface-800 transition-colors relative h-dvh sticky top-0" [style.width.px]="sidebarService.width()">
    <app-dashboard-layout-sidebar class="w-full"/>

    <button
      type="button"
      class="absolute top-1/2 -translate-y-1/2 right-0 translate-x-1/2 z-10 flex items-center justify-center w-3 h-15 rounded-sm border border-surface-200 dark:border-surface-800 bg-surface-0 dark:bg-surface-950 cursor-col-resize hover:bg-surface-50 dark:hover:bg-surface-900 active:bg-surface-100 dark:active:bg-surface-800 transition-colors focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary"
      role="separator"
      aria-label="Resize sidebar"
      aria-orientation="vertical"
      [attr.aria-valuemin]="sidebarService.minWidth()"
      [attr.aria-valuemax]="sidebarService.maxWidth()"
      [attr.aria-valuenow]="sidebarService.width()"
      appDashboardSidebarResizeHandle
      pRipple
    >
      <i class="pi pi-ellipsis-v text-surface-400 text-xs"></i>
    </button>
  </aside>

  <!-- Mobile drawer -->
  <p-drawer [visible]="sidebarService.visible()" (visibleChange)="sidebarService.setVisible($event)" [blockScroll]="true">
    <ng-template #headless>
      <app-dashboard-layout-sidebar/>
    </ng-template>
  </p-drawer>

  <!-- Main area -->
  <div class="grid grid-rows-[auto_1fr] w-full min-w-0 bg-surface-50 dark:bg-surface-900">
    <app-dashboard-layout-header/>
    <app-dashboard-layout-content>
      <router-outlet/>
    </app-dashboard-layout-content>
  </div>
</div>
