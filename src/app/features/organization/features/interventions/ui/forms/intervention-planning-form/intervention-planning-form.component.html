<form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-6 grid gap-5 sm:grid-cols-2">
  <label class="grid gap-1.5 text-sm font-medium">
    <span>Site <span class="text-red-500" aria-hidden="true">*</span></span>
    <p-select
      formControlName="site"
      [options]="[...siteOptions()]"
      optionLabel="label"
      optionValue="value"
      [filter]="true"
      placeholder="Select a site"
      [invalid]="form.controls.site.invalid && form.controls.site.touched"
    />
  </label>

  <label class="grid gap-1.5 text-sm font-medium">
    <span>Responsible agent <span class="text-red-500" aria-hidden="true">*</span></span>
    <p-select
      formControlName="responsible"
      [options]="[...memberOptions()]"
      optionLabel="label"
      optionValue="value"
      [filter]="true"
      filterBy="label,roleLabel"
      [showClear]="true"
      placeholder="Assign a responsible agent"
      [invalid]="form.controls.responsible.invalid && form.controls.responsible.touched"
    >
      <ng-template #item let-option>
        <app-intervention-member-option [option]="option" />
      </ng-template>
      <ng-template #selectedItem let-option>
        @if (option) {
          <app-intervention-member-option [option]="option" [compact]="true" />
        }
      </ng-template>
    </p-select>
  </label>

  <label class="grid gap-1.5 text-sm font-medium sm:col-span-2">
    Participants
    <p-multiselect
      formControlName="participants"
      [options]="[...memberOptions()]"
      optionLabel="label"
      optionValue="value"
      [filter]="true"
      filterBy="label,roleLabel"
      display="chip"
      placeholder="Add field participants"
    >
      <ng-template #item let-option>
        <app-intervention-member-option [option]="option" />
      </ng-template>
    </p-multiselect>
  </label>

  <label class="grid gap-1.5 text-sm font-medium">
    <span>Planned start <span class="text-red-500" aria-hidden="true">*</span></span>
    <p-datepicker
      formControlName="plannedStartAt"
      [showTime]="true"
      hourFormat="24"
      [showIcon]="true"
      [showClear]="true"
      [showButtonBar]="true"
      appendTo="body"
      dateFormat="yy-mm-dd"
      placeholder="Select start date and time"
      class="w-full"
      [invalid]="form.controls.plannedStartAt.invalid && form.controls.plannedStartAt.touched"
    />
  </label>

  <label class="grid gap-1.5 text-sm font-medium">
    <span>Due <span class="text-red-500" aria-hidden="true">*</span></span>
    <p-datepicker
      formControlName="dueAt"
      [showTime]="true"
      hourFormat="24"
      [showIcon]="true"
      [showClear]="true"
      [showButtonBar]="true"
      [minDate]="form.controls.plannedStartAt.value ?? undefined"
      appendTo="body"
      dateFormat="yy-mm-dd"
      placeholder="Select due date and time"
      class="w-full"
      [invalid]="form.controls.dueAt.invalid && form.controls.dueAt.touched"
    />
  </label>

  <label class="grid gap-1.5 text-sm font-medium">
    <span>Priority <span class="text-red-500" aria-hidden="true">*</span></span>
    <p-select
      formControlName="priority"
      [options]="[...priorityOptions]"
      optionLabel="label"
      optionValue="value"
    >
      <ng-template #selectedItem let-option>
        @if (option) {
          <app-intervention-option kind="priority" [value]="option.value" />
        }
      </ng-template>
      <ng-template #item let-option>
        <app-intervention-option kind="priority" [value]="option.value" />
      </ng-template>
    </p-select>
  </label>

  <div class="flex items-end sm:justify-end">
    <p-button
      label="Save planning details"
      type="submit"
      icon="pi pi-save"
      severity="secondary"
      [outlined]="true"
      [loading]="loading()"
      [disabled]="form.invalid || disabled() || loading()"
    />
  </div>
</form>
