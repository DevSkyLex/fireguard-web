<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  title="Non-Conformities Resolved"
  description="Resolved non-conformities over time"
  [metrics]="summaryMetrics()"
  [loading]="isLoading()"
>
  <ng-template #action>
    <app-non-conformities-resolved-toolbar
      (filterToggle)="onFilterToggle()"
      (menuToggle)="onMenuToggle($event)"
    />
  </ng-template>

  <ng-template #content>
    <app-non-conformities-resolved-chart />
  </ng-template>
</app-trend-card>

<app-trend-filter-drawer
  title="Non-Conformities Resolved Filters"
  description="Refine resolved non-conformity metrics by status, severity, period, and comparison mode."
  [visible]="isFilterDrawerVisible()"
  [loading]="isLoading()"
  (cancel)="onCancelFilters()"
  (reset)="onResetFilters()"
  (apply)="onApplyFilters()"
>
  <app-non-conformities-resolved-filters />
</app-trend-filter-drawer>
