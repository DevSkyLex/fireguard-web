<div id="mfa-verification-page" class="flex w-full flex-col gap-7">
  <!-- MFA Verification Form -->
  <section class="flex flex-col">
    <h2
      class="mb-2 text-2xl font-semibold text-surface-900 dark:text-surface-100"
      i18n="@@auth.mfa.title"
    >
      Multi-Factor Authentication
    </h2>
    <p class="text-sm text-surface-600 dark:text-surface-400" i18n="@@auth.mfa.subtitle">
      Please enter the verification code from your authenticator app or email.
    </p>
  </section>

  <!-- OTP Verification Form -->
  <section class="flex flex-col">
    <app-otp-verification-form
      [showTrustDevice]="showTrustDevice()"
      [loading]="loading()"
      [resendIn]="resendIn()"
      (submitted)="handleOtpSubmit($event)"
      (cancelled)="handleOtpCancel()"
      (resend)="handleOtpResend()"
    />
  </section>
</div>
