<div
  class="flex flex-col gap-4 rounded-xl border border-surface-200 bg-surface-0 p-4 sm:flex-row sm:items-start sm:justify-between dark:border-surface-800 dark:bg-surface-950"
>
  <div class="flex min-w-0 items-start gap-3">
    <p-button
      icon="pi pi-arrow-left"
      severity="secondary"
      [text]="true"
      [rounded]="true"
      ariaLabel="Back to checklists"
      (onClick)="back.emit()"
    />
    <p-avatar icon="pi pi-list-check" shape="square" size="xlarge" />
    <div class="flex min-w-0 flex-col gap-1">
      <div class="flex flex-wrap items-center gap-2">
        <h1 class="truncate text-2xl font-semibold text-surface-900 dark:text-surface-100">
          {{ checklist().name }}
        </h1>
        <p-tag
          [value]="checklist().status | titlecase"
          [severity]="checklist().status === 'active' ? 'success' : 'secondary'"
        />
      </div>
      <div class="flex flex-wrap items-center gap-3 text-sm text-surface-500 dark:text-surface-300">
        <span>Version {{ checklist().version }}</span>
        <span>Updated {{ checklist().updatedAt | date: 'medium' }}</span>
      </div>
    </div>
  </div>
  @if (canManage() && checklist().status === 'active') {
    <p-button
      label="Archive"
      icon="pi pi-box"
      severity="danger"
      [outlined]="true"
      size="small"
      [loading]="archiving()"
      (onClick)="archive.emit()"
    />
  }
</div>
