<div [formGroup]="form" class="grid gap-4">
  <div class="flex flex-col gap-2">
    <label
      for="inspections-inspection-status"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
    >
      Inspection status
    </label>

    <p-select
      id="inspections-inspection-status"
      formControlName="inspectionStatus"
      [options]="inspectionStatusOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="All inspection statuses"
      [showClear]="true"
      [loading]="store.isQueryLoading()"
      class="w-full"
    >
      <ng-template #item let-option>
        <app-tag [descriptor]="option" variant="inline" />
      </ng-template>
      <ng-template #selectedItem>
        @let option = selectedInspectionStatusOption();
        @if (option) {
          <app-tag [descriptor]="option" variant="inline" />
        }
      </ng-template>
    </p-select>
  </div>

  <div class="flex flex-col gap-2">
    <label
      for="inspections-inspection-result"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
    >
      Inspection result
    </label>

    <p-select
      id="inspections-inspection-result"
      formControlName="inspectionResult"
      [options]="inspectionResultOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="All inspection results"
      [showClear]="true"
      [loading]="store.isQueryLoading()"
      class="w-full"
    >
      <ng-template #item let-option>
        <app-tag [descriptor]="option" variant="inline" />
      </ng-template>
      <ng-template #selectedItem>
        @let option = selectedInspectionResultOption();
        @if (option) {
          <app-tag [descriptor]="option" variant="inline" />
        }
      </ng-template>
    </p-select>
  </div>

  <div class="flex flex-col gap-2">
    <label
      for="inspections-inspector-type"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
    >
      Inspector type
    </label>

    <p-select
      id="inspections-inspector-type"
      formControlName="inspectorType"
      [options]="inspectorTypeOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="All inspector types"
      [showClear]="true"
      [loading]="store.isQueryLoading()"
      class="w-full"
    />
  </div>

  <app-trend-base-filters-form
    dateRangeId="inspections-date-range"
    [dateRange]="store.draftDateRange()"
    [compareEnabled]="store.draftCompareEnabled()"
    [loading]="store.isQueryLoading()"
    (dateRangeChange)="store.setDraftDateRange($event)"
    (compareEnabledChange)="store.setDraftCompareEnabled($event)"
  />
</div>
