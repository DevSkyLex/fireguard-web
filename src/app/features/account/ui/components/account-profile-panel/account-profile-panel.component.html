<div class="flex flex-col gap-6">
  <!-- Avatar: persisted through its own /api/me/avatar endpoint -->
  <app-account-avatar-form
    [avatarUrl]="userStore.avatarUrlMedium()"
    [initials]="userStore.initials()"
    [uploading]="editStore.isUploadingAvatar()"
    [hasError]="editStore.avatarError() !== null"
    (avatarSelected)="uploadAvatar($event)"
  />

  <p-divider class="my-0" />

  <!-- Profile fields: persisted through PATCH /api/me -->
  <app-account-profile-form
    [profile]="userStore.profile()"
    [saving]="editStore.isSaving()"
    [hasSaveError]="editStore.saveError() !== null"
    (submitted)="save($event)"
  />

  <p-divider class="my-0" />

  <!-- Password: two-step OTP-protected change through /api/me/password -->
  <app-account-password-form
    [step]="passwordStore.step()"
    [requesting]="passwordStore.isRequesting()"
    [confirming]="passwordStore.isConfirming()"
    [hasRequestError]="passwordStore.requestError() !== null"
    [hasConfirmError]="passwordStore.confirmError() !== null"
    [maskedRecipient]="passwordStore.maskedRecipient()"
    (requested)="requestPasswordChange($event)"
    (confirmed)="confirmPasswordChange($event)"
    (cancelled)="restartPasswordChange()"
  />
</div>
