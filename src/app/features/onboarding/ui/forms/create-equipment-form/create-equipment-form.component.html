<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex w-full flex-col gap-6">
  <!-- Equipment Type -->
  <div class="flex flex-col gap-2">
    <label
      for="equipmentType"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
      i18n="@@onboarding.equipment.typeLabel"
      >Equipment type</label
    >
    <p-select
      inputId="equipmentType"
      formControlName="type"
      [options]="equipmentTypes"
      optionLabel="label"
      optionValue="value"
      fluid
      placeholder="Select a type"
      i18n-placeholder="@@onboarding.field.selectType"
    />
    @if (form.controls.type.invalid && form.controls.type.touched) {
      <p-message severity="error" variant="simple"
        ><span i18n="@@onboarding.field.typeRequired">Type is required.</span></p-message
      >
    }
  </div>

  <!-- Brand -->
  <div class="flex flex-col gap-2">
    <label
      for="equipmentBrand"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
      i18n="@@onboarding.equipment.brandLabel"
    >
      Brand <span class="font-normal text-surface-400">(optional)</span>
    </label>
    <input
      pInputText
      id="equipmentBrand"
      formControlName="brand"
      fluid
      placeholder="Amerex, Tyco, Kidde…"
      i18n-placeholder="@@onboarding.equipment.brandPlaceholder"
    />
  </div>

  <!-- Model -->
  <div class="flex flex-col gap-2">
    <label
      for="equipmentModel"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
      i18n="@@onboarding.equipment.modelLabel"
    >
      Model <span class="font-normal text-surface-400">(optional)</span>
    </label>
    <input
      pInputText
      id="equipmentModel"
      formControlName="model"
      fluid
      placeholder="ABC-2.5, EX-9000…"
      i18n-placeholder="@@onboarding.equipment.modelPlaceholder"
    />
  </div>

  <!-- Serial Number -->
  <div class="flex flex-col gap-2">
    <label
      for="serialNumber"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
      i18n="@@onboarding.equipment.serialLabel"
    >
      Serial number
      <span class="font-normal text-surface-400">(optional)</span>
    </label>
    <input
      pInputText
      id="serialNumber"
      formControlName="serialNumber"
      fluid
      placeholder="SN-20241234"
      i18n-placeholder="@@onboarding.equipment.serialPlaceholder"
    />
  </div>

  <!-- Submit -->
  <p-button
    label="Create equipment"
    i18n-label="@@onboarding.equipment.submit"
    type="submit"
    icon="pi pi-arrow-right"
    iconPos="right"
    [loading]="loading()"
    [disabled]="form.invalid || loading()"
    fluid
  />
</form>
