<app-inspection-table
  class="flex min-h-0 flex-1 flex-col"
  [inspections]="store.inspections()"
  [total]="store.totalInspections()"
  [loading]="store.isLoadingInspections()"
  [empty]="store.isEmpty()"
  [initialPage]="page()"
  (load)="onLoad($event)"
  (pageChange)="onPageChange($event)"
  (add)="onAdd()"
/>
