<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex w-full flex-col gap-8">
  <!-- Email Field -->
  <div class="flex flex-col gap-2">
    <label
      for="email"
      class="text-sm font-medium text-surface-700 dark:text-surface-300"
      i18n="@@auth.login.email.label"
      >Email Address</label
    >
    <p-iconfield>
      <p-inputicon class="pi pi-envelope" />
      <input
        pInputText
        id="email"
        formControlName="email"
        class="w-full"
        placeholder="example@email.com"
      />
    </p-iconfield>

    @if (form.controls.email.invalid && form.controls.email.touched) {
      <p-message severity="error" variant="simple">
        @if (form.controls.email.hasError('required')) {
          <span i18n="@@auth.login.email.required">Email is required.</span>
        }
        @if (form.controls.email.hasError('email')) {
          <span i18n="@@auth.login.email.invalid">Please enter a valid email address.</span>
        }
      </p-message>
    }
  </div>

  <!-- Actions -->
  <div class="flex flex-col gap-3">
    <p-button
      label="Send Verification Code"
      i18n-label="@@auth.forgotPassword.submit"
      type="submit"
      [loading]="loading()"
      [disabled]="form.invalid || loading()"
      styleClass="w-full"
    />
  </div>
</form>
