<div class="flex flex-col items-center justify-center min-h-screen p-4">
  <section class="flex flex-col">
    <h2 class="text-2xl font-semibold text-surface-900 mb-2">
      Set New Password
    </h2>
    <p class="text-sm text-surface-600">
      Please enter your new password below to reset
      your account password.
    </p>
  </section>

  <!-- New Password Form -->
  <section class="flex flex-col">
    <app-new-password-form
      [loading]="isResetting()"
      (submitted)="handlePasswordSubmit($event)"
      (cancelled)="handlePasswordCancel()"
    />
  </section>
</div>
