<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex w-full flex-col gap-8">
  <section class="flex flex-col gap-5" aria-labelledby="intervention-discovery-heading">
    <div>
      <h2
        id="intervention-discovery-heading"
        class="text-lg font-semibold text-surface-900 dark:text-surface-100"
      >
        Field discovery
      </h2>
      <p class="mt-0.5 text-sm text-surface-500 dark:text-surface-400">
        Record work that was not part of the prepared scope. It will be highlighted during review.
      </p>
    </div>

    <div class="grid gap-5">
      <label class="grid gap-1.5 text-sm">
        <span class="font-medium">Action</span>
        <p-select
          formControlName="action"
          [options]="[...actionOptions]"
          optionLabel="label"
          optionValue="value"
          appendTo="body"
        >
          <ng-template #selectedItem let-option>
            @if (option) {
              <app-intervention-option kind="workItemAction" [value]="option.value" />
            }
          </ng-template>
          <ng-template #item let-option>
            <app-intervention-option kind="workItemAction" [value]="option.value" />
          </ng-template>
        </p-select>
      </label>

      <label class="grid gap-1.5 text-sm">
        <span class="font-medium">
          {{
            form.controls.action.value === 'site_setup'
              ? 'Facility name'
              : form.controls.action.value === 'inventory'
                ? 'Equipment type'
                : 'Equipment resource'
          }}
          <span class="text-red-500" aria-hidden="true">*</span>
        </span>
        @if (form.controls.action.value === 'inventory') {
          <p-select
            formControlName="target"
            [options]="[...equipmentTypeOptions()]"
            optionLabel="label"
            optionValue="value"
            [filter]="true"
            appendTo="body"
            placeholder="Select an equipment type"
            [invalid]="form.controls.target.invalid && form.controls.target.touched"
          />
        } @else {
          <input
            pInputText
            formControlName="target"
            class="w-full"
            [invalid]="form.controls.target.invalid && form.controls.target.touched"
            [placeholder]="
              form.controls.action.value === 'site_setup'
                ? 'Example: Electrical room'
                : 'Example: Extinguisher #A-12'
            "
          />
        }
        @if (form.controls.target.invalid && form.controls.target.touched) {
          <p-message severity="error" variant="simple">
            <span>Describe the discovered resource.</span>
          </p-message>
        }
      </label>

      @if (form.controls.action.value === 'inspection') {
        <label class="grid gap-1.5 text-sm">
          <span class="font-medium">Initial result</span>
          <p-select
            formControlName="result"
            [options]="[...resultOptions]"
            optionLabel="label"
            optionValue="value"
            appendTo="body"
          >
            <ng-template #selectedItem let-option>
              @if (option) {
                <app-intervention-option kind="inspectionResult" [value]="option.value" />
              }
            </ng-template>
            <ng-template #item let-option>
              <app-intervention-option kind="inspectionResult" [value]="option.value" />
            </ng-template>
          </p-select>
        </label>
      }
    </div>
  </section>

  <div class="sticky bottom-0 -mb-2 bg-surface-0 pt-4 pb-2 dark:bg-surface-900">
    <p-button
      label="Add discovery"
      type="submit"
      icon="pi pi-plus"
      [fluid]="true"
      [loading]="loading()"
      [disabled]="form.invalid || disabled() || loading()"
    />
  </div>
</form>
