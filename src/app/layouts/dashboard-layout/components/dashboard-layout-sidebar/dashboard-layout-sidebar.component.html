<aside
  class="relative grid h-dvh max-h-dvh w-full grid-cols-1 grid-rows-[auto_1fr_auto] bg-surface-0 text-surface-900 transition-colors [grid-template-areas:'header'_'navigation'_'footer'] dark:bg-surface-950 dark:text-surface-100"
>
  <!-- Sidebar header -->
  <section class="[grid-area:header]">
    <app-dashboard-layout-sidebar-header />
  </section>

  <!-- Sidebar navigation -->
  <section class="overflow-y-auto [grid-area:navigation]">
    @if (variant() === 'primary') {
      <app-dashboard-layout-sidebar-navigation
        [items]="navigationService.primaryItems"
        [showSearch]="false"
      />
    } @else {
      <app-dashboard-layout-sidebar-navigation />
    }
  </section>

  <!-- Sidebar footer -->
  <section
    class="border-t border-surface-200 transition-colors [grid-area:footer] dark:border-surface-800"
  >
    <app-dashboard-layout-sidebar-footer />
  </section>
</aside>
