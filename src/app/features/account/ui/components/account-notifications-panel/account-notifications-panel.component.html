<div id="account-notifications-panel" class="flex flex-col gap-4">
  @if (notificationStore.listError()) {
    <p-message severity="error">
      <div class="flex flex-wrap items-center gap-3">
        <span i18n="@@account.notifications.loadError"
          >Failed to load notifications. Please try again later.</span
        >
        <p-button
          label="Retry"
          i18n-label="@@common.retry"
          icon="pi pi-refresh"
          severity="secondary"
          [text]="true"
          (onClick)="retry()"
        />
      </div>
    </p-message>
  }

  <app-notification-table
    [notifications]="notificationStore.notifications()"
    [total]="notificationStore.totalNotifications()"
    [loading]="notificationStore.isLoading()"
    [empty]="notificationStore.totalNotifications() === 0"
    [unreadCount]="notificationStore.unreadCount()"
    (load)="onLoad($event)"
    (markAsRead)="onMarkAsRead($event)"
  />
</div>
