<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  i18n-title="@@org.trend.inspections.title"
  title="Inspections"
  i18n-description="@@org.trend.inspections.desc"
  description="Total inspections over time"
  [metrics]="summaryMetrics()"
  [loading]="isLoading()"
>
  <ng-template #action>
    <app-inspections-toolbar
      [activeFilterCount]="activeFilterCount()"
      (filterToggle)="onFilterToggle()"
      (menuToggle)="onMenuToggle($event)"
    />
  </ng-template>

  <ng-template #content>
    <app-inspections-chart />
  </ng-template>
</app-trend-card>

<app-trend-filter-drawer
  i18n-title="@@org.trend.inspections.filterTitle"
  title="Inspections Filters"
  i18n-description="@@org.trend.inspections.filterDesc"
  description="Refine inspection metrics by status, result, inspector type, period, and comparison mode."
  [visible]="isFilterDrawerVisible()"
  [loading]="isLoading()"
  (cancel)="onCancelFilters()"
  (reset)="onResetFilters()"
  (apply)="onApplyFilters()"
>
  <app-inspections-filters />
</app-trend-filter-drawer>
