<p-drawer
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  [header]="title()"
  [appendTo]="'body'"
  [blockScroll]="true"
  [modal]="true"
  [dismissible]="true"
  [closeOnEscape]="true"
  position="right"
  styleClass="!w-full sm:!w-[32rem]"
>
  <ng-template #content>
    <div class="flex flex-col gap-4 pr-1">
      @if (description(); as description) {
        <p class="text-sm text-surface-600 dark:text-surface-400">
          {{ description }}
        </p>
      }

      <ng-content />
    </div>
  </ng-template>

  <ng-template #footer>
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <p-button
        icon="pi pi-refresh"
        severity="secondary"
        (onClick)="onReset()"
        class="flex-none"
        outlined
        fluid
      />
      <p-button
        label="Apply"
        [loading]="loading()"
        (onClick)="onApply()"
        class="flex-1"
        fluid
      />
    </div>
  </ng-template>
</p-drawer>
