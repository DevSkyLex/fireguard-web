<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  [title]="cardTitle()"
  [description]="cardDescription()"
  [metrics]="summaryMetrics()"
  [loading]="isLoading()"
>
  <ng-template #action>
    <app-asset-growth-toolbar
      [activeFilterCount]="activeFilterCount()"
      [filtersAvailable]="filtersAvailable()"
      (filterToggle)="onFilterToggle()"
      (menuToggle)="onMenuToggle($event)"
    />
  </ng-template>

  <ng-template #content>
    <app-asset-growth-chart />
  </ng-template>
</app-trend-card>

<app-trend-filter-drawer
  [title]="filterDrawerTitle()"
  i18n-description="@@org.trend.assetGrowth.filterDesc"
  description="Refine asset growth metrics by equipment, facility, period, and comparison mode."
  [visible]="isFilterDrawerVisible()"
  [loading]="isLoading()"
  (cancel)="onCancelFilters()"
  (reset)="onResetFilters()"
  (apply)="onApplyFilters()"
>
  <app-asset-growth-filters />
</app-trend-filter-drawer>
