<div id="organization-legal-profile" class="flex flex-col">
  <section
    class="border-b border-surface-200 bg-surface-50 p-8 dark:border-surface-800 dark:bg-surface-900"
  >
    <h1 class="text-2xl font-semibold">Legal profile</h1>
    <p class="text-sm text-surface-500">Maintain the legal identity used by this organization.</p>
  </section>
  <section class="max-w-4xl p-8">
    @if (store.loadError(); as error) {
      <p-message severity="error" class="mb-4">
        <div class="flex flex-wrap items-center gap-3">
          <span>{{ error.message ?? 'The legal profile could not be loaded.' }}</span>
          <p-button
            label="Retry"
            icon="pi pi-refresh"
            severity="secondary"
            [text]="true"
            (onClick)="reload()"
          />
        </div>
      </p-message>
    }
    @if (store.saveError(); as error) {
      <p-message severity="error" class="mb-4">{{
        error.message ?? 'The legal profile could not be saved.'
      }}</p-message>
    }
    <app-organization-legal-profile-form
      [profile]="store.profile()"
      [loading]="store.isLoading() || store.isSaving()"
      (submitted)="save($event)"
    />
  </section>
</div>
