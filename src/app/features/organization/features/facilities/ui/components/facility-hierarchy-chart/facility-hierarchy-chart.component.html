<div id="facility-hierarchy-chart" class="flex min-h-40 items-center overflow-x-auto py-2">
  @if (nodes().length > 0) {
    <p-organization-chart
      [value]="nodes()"
      [collapsible]="true"
      [preserveSpace]="false"
      (onNodeExpand)="onNodeExpand($event)"
      (onNodeCollapse)="onNodeCollapse($event)"
    >
      <ng-template let-node pTemplate="default">
        @if (node.data?.placeholder) {
          <div class="flex w-40 items-center gap-2 px-1 py-1">
            <p-skeleton shape="circle" size="1.75rem" />
            <div class="flex flex-1 flex-col gap-1">
              <p-skeleton width="100%" height="0.75rem" />
              <p-skeleton width="60%" height="0.625rem" />
            </div>
          </div>
        } @else if (node.data?.facility; as facility) {
          <div class="flex w-48 flex-col gap-2 text-left">
            <div class="flex items-center gap-2">
              <p-avatar [icon]="facilityTypeIcons[facility.type]" shape="circle" size="normal" />
              <div class="flex min-w-0 flex-1 flex-col">
                <span
                  class="truncate text-sm font-semibold text-surface-900 dark:text-surface-100"
                  [title]="facility.name"
                >
                  {{ facility.name }}
                </span>
                @if (facility.code) {
                  <span class="truncate font-mono text-xs text-surface-500">
                    {{ facility.code }}
                  </span>
                }
              </div>
            </div>

            <div class="flex items-center justify-between gap-2">
              <div class="flex items-center gap-1.5">
                <p-tag
                  class="rounded-md text-xs"
                  [severity]="facility.type === 'site' ? 'info' : 'secondary'"
                >
                  <div class="flex items-center gap-1">
                    <i [class]="facilityTypeIcons[facility.type]" class="text-[0.625rem]"></i>
                    <span class="text-xs font-semibold capitalize">{{ facility.type }}</span>
                  </div>
                </p-tag>

                <span
                  class="h-1.5 w-1.5 shrink-0 rounded-full"
                  [class.bg-green-500]="facility.status === 'active'"
                  [class.bg-orange-500]="facility.status === 'archived'"
                  [title]="facility.status"
                ></span>
              </div>

              @if (facility.id !== root()?.id) {
                <button
                  type="button"
                  class="inline-flex items-center gap-1 text-xs font-medium text-primary hover:underline"
                  (click)="onNavigate(facility)"
                >
                  <span i18n="@@common.view">View</span>
                  <i class="pi pi-arrow-right text-[0.625rem]"></i>
                </button>
              }
            </div>
          </div>
        }
      </ng-template>
    </p-organization-chart>
  } @else {
    <div
      i18n="@@facility.hierarchy.empty"
      class="flex items-center justify-center py-8 text-sm text-surface-500"
    >
      No hierarchy to display.
    </div>
  }
</div>
