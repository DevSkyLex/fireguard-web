<div id="new-password-page" class="flex flex-col gap-7 w-full">
  <!-- Set Your New Password -->
  <section class="flex flex-col">
    <h2 class="text-2xl font-semibold text-surface-900 mb-2">
      Set Your New Password
    </h2>
    <p class="text-sm text-surface-600">
      Please enter a new password for your account. Make sure to choose a strong
      password that you haven't used before.
    </p>
  </section>

  <!-- New Password Form -->
  <section class="flex flex-col">
    <app-new-password-form
      [loading]="isResetting()"
      (submitted)="handlePasswordSubmit($event)"
      (cancelled)="handlePasswordCancel()"
    />
  </section>
</div>
