@if (organization(); as org) {
  <div class="border-b border-surface-200 dark:border-surface-800">

    <!-- Current org identity -->
    <div class="flex items-center gap-2 px-3 pt-2.5 pb-1.5">
      <p-avatar
        [label]="orgInitials(org.name)"
        [pt]="avatarPt(org)"
      />
      <div class="flex flex-col min-w-0">
        <span class="text-xs font-semibold text-surface-900 dark:text-surface-100 truncate leading-tight">
          {{ org.name }}
        </span>
        <span class="text-[10px] text-surface-400 leading-tight">Current organization</span>
      </div>
    </div>

    <!-- Management links -->
    <nav class="pb-1">
      <a
        pRipple
        [routerLink]="['/organizations', org.id, 'members']"
        (click)="navigate.emit()"
        class="flex items-center gap-2.5 px-3 py-1.5 text-sm text-surface-600 dark:text-surface-400 hover:bg-surface-50 dark:hover:bg-surface-800 hover:text-surface-900 dark:hover:text-surface-100 transition-colors cursor-pointer"
      >
        <i class="pi pi-users text-xs w-3.5 text-center shrink-0"></i>
        <span>Members</span>
      </a>
      <a
        pRipple
        [routerLink]="['/organizations', org.id, 'settings']"
        (click)="navigate.emit()"
        class="flex items-center gap-2.5 px-3 py-1.5 text-sm text-surface-600 dark:text-surface-400 hover:bg-surface-50 dark:hover:bg-surface-800 hover:text-surface-900 dark:hover:text-surface-100 transition-colors cursor-pointer"
      >
        <i class="pi pi-cog text-xs w-3.5 text-center shrink-0"></i>
        <span>Settings</span>
      </a>
      <a
        pRipple
        [routerLink]="['/organizations', org.id, 'billing']"
        (click)="navigate.emit()"
        class="flex items-center gap-2.5 px-3 py-1.5 text-sm text-surface-600 dark:text-surface-400 hover:bg-surface-50 dark:hover:bg-surface-800 hover:text-surface-900 dark:hover:text-surface-100 transition-colors cursor-pointer"
      >
        <i class="pi pi-credit-card text-xs w-3.5 text-center shrink-0"></i>
        <span>Billing</span>
      </a>
    </nav>

  </div>
}
