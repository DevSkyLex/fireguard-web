<li
  class="flex cursor-default gap-3 px-4 py-3 transition-colors hover:bg-surface-50 dark:hover:bg-surface-800"
  [class.bg-primary-50]="!notification().isRead"
>
  <!-- Category icon -->
  <span
    class="mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-full text-sm"
    [class]="iconBg() + ' ' + iconText()"
    [title]="notification().type"
  >
    <i class="pi text-xs" [class]="icon()"></i>
  </span>

  <!-- Content -->
  <div class="flex min-w-0 flex-1 flex-col gap-0.5">
    <p
      class="truncate text-sm font-medium text-surface-900 dark:text-surface-100"
      [title]="notification().subject"
    >
      {{ notification().subject }}
    </p>
    <p class="line-clamp-2 text-xs text-surface-500 dark:text-surface-400">
      {{ notification().body }}
    </p>
    <span class="mt-0.5 text-xs text-surface-400 dark:text-surface-500">
      {{ notification().createdAt | date: 'short' }}
    </span>
  </div>

  <!-- Unread dot -->
  @if (!notification().isRead) {
    <button
      type="button"
      class="mt-2 h-2 w-2 shrink-0 cursor-pointer rounded-full bg-primary transition-transform hover:scale-125"
      title="Mark as read"
      (click)="onMarkAsRead($event)"
    ></button>
  }
</li>
