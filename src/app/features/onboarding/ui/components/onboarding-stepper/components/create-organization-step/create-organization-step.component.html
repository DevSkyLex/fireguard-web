<div class="flex flex-col gap-6">
  @if (!step().required) {
    <p-tag
      value="Optional"
      i18n-value="@@common.optionalTag"
      severity="secondary"
      [rounded]="true"
      styleClass="self-start"
    />
  }

  <div class="flex flex-col gap-1.5">
    <h2
      class="text-2xl font-semibold tracking-tight text-balance text-surface-900 dark:text-surface-0"
      i18n="@@onboarding.org.title"
    >
      Create your organization
    </h2>
    <p
      class="text-sm leading-relaxed text-surface-500 dark:text-surface-400"
      i18n="@@onboarding.org.subtitle"
    >
      Set up the basic information for your fire safety company.
    </p>
  </div>

  <app-create-organization-form
    [loading]="isCreatingOrganization() || isExecuting()"
    (submitted)="handleSubmit($event)"
  />
</div>
