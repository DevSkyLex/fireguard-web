@if (isLoading()) {
  <p-skeleton width="9rem" height="2rem" borderRadius="0.375rem"/>
} @else {
  <p-button
    severity="secondary"
    [outlined]="true"
    size="small"
    [disabled]="isSwitching()"
    (onClick)="onButtonClick($event)"
  >
    @if (organization(); as org) {
      <span class="flex items-center gap-2">
        <p-avatar
          [label]="orgInitials(org.name)"
          [pt]="avatarPt(org)"
        />
        <span class="text-sm font-medium max-w-32 truncate">{{ org.name }}</span>

        <div class="mx-auto">
          @if (isSwitching()) {
            <i class="pi pi-spin pi-spinner text-sm shrink-0"></i>
          } @else {
            <i class="pi pi-chevron-down text-[10px] shrink-0"></i>
          }
        </div>
      </span>
    } @else {
      <span class="flex items-center gap-2">
        <span class="size-4 rounded bg-surface-200 dark:bg-surface-700 shrink-0"></span>
        <span class="text-sm">Select workspace</span>
        <i class="pi pi-chevron-down text-[10px] shrink-0"></i>
      </span>
    }
  </p-button>
}
