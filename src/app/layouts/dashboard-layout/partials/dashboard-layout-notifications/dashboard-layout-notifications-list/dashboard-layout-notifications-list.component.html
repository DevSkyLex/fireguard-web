@if (loading()) {
  <div class="flex flex-col divide-y divide-surface-100 max-h-80 overflow-y-auto">
    @for (item of skeletonItems; track item) {
      <div class="flex gap-3 px-4 py-3">
        <p-skeleton shape="circle" size="0.375rem" styleClass="mt-1.5 shrink-0" />
        <div class="flex-1 flex flex-col gap-1.5">
          <p-skeleton width="65%" height="0.875rem" />
          <p-skeleton width="100%" height="0.75rem" />
          <p-skeleton width="40%" height="0.75rem" />
        </div>
      </div>
    }
  </div>
} @else {
  <p-dataview [value]="notificationsList()">
    <ng-template #list let-items>
      <div class="flex flex-col divide-y divide-surface-100 max-h-80 overflow-y-auto">
        @for (notification of items; track notification.id) {
          <app-dashboard-layout-notifications-item
            [notification]="notification"
            (markAsRead)="markAsRead.emit(notification.id)"
          />
        }
      </div>
    </ng-template>

    <ng-template #empty>
      <div class="flex flex-col items-center gap-2 py-8 px-4 text-center">
        <i class="pi pi-bell text-3xl text-surface-300"></i>
        <p class="text-sm text-surface-500">No notifications yet</p>
      </div>
    </ng-template>
  </p-dataview>
}
