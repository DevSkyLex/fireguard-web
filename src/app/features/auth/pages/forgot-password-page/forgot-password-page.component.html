<div id="forgot-password-page" class="flex flex-col gap-7 w-full">
  <section class="flex flex-col">
    <h2 class="text-2xl font-semibold text-surface-900 dark:text-surface-100 mb-2">
      Forgot Your Password?
    </h2>
    <p class="text-sm text-surface-600 dark:text-surface-400">
      Enter your email address below, and we'll send you instructions to reset your password.
    </p>
  </section>

  <!-- Forgot password form -->
  <section class="flex flex-col">
    <app-forgot-password-form
      [loading]="passwordResetStore.isRequesting()"
      (submitted)="handleSubmit($event)"
    />
  </section>

  <!-- Back to login link -->
  <section class="flex flex-col">
    <p class="text-center text-sm text-surface-500 dark:text-surface-400">
      Remember your password?
      <a routerLink="/auth/login" class="text-primary-500 hover:text-primary-600 font-medium transition-colors">
        Back to login
      </a>
    </p>
  </section>
</div>
