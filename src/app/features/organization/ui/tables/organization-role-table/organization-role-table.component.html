<p-card>
  <p-table [value]="loading() ? skeletonItems : [...roles()]" dataKey="id" [stripedRows]="true">
    <ng-template pTemplate="header"
      ><tr>
        <th i18n="@@org.roleTable.name">Name</th>
        <th i18n="@@org.roleTable.description">Description</th>
        <th i18n="@@org.roleTable.permissions">Permissions</th>
        <th class="w-28"><span i18n="@@org.roleTable.actions" class="sr-only">Actions</span></th>
      </tr></ng-template
    >
    <ng-template pTemplate="body" let-role>
      @if (loading()) {
        <tr>
          <td><p-skeleton width="8rem" /></td>
          <td><p-skeleton width="12rem" /></td>
          <td><p-skeleton width="14rem" /></td>
          <td><p-skeleton width="5rem" /></td>
        </tr>
      } @else {
        <tr>
          <td class="font-medium">
            {{ role.name }}
            @if (role.isSystem) {
              <span i18n="@@org.roleTable.system" class="text-xs text-surface-500">(system)</span>
            }
          </td>
          <td>{{ role.description || noDescriptionLabel }}</td>
          <td class="max-w-xl text-sm text-surface-500">
            {{ role.permissions.join(', ') || noPermissionsLabel }}
          </td>
          <td class="text-right">
            @if (canManage()) {
              <p-button
                icon="pi pi-pencil"
                severity="secondary"
                [text]="true"
                [rounded]="true"
                i18n-ariaLabel="@@org.roleTable.editAria"
                ariaLabel="Edit role"
                (onClick)="edit.emit(role)"
              />
              @if (!role.isSystem) {
                <p-button
                  icon="pi pi-trash"
                  severity="danger"
                  [text]="true"
                  [rounded]="true"
                  i18n-ariaLabel="@@org.roleTable.deleteAria"
                  ariaLabel="Delete role"
                  (onClick)="remove.emit(role)"
                />
              }
            }
          </td>
        </tr>
      }
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr class="bg-transparent! [&>td]:border-b-0!">
        <td colspan="4">
          <app-empty-state
            icon="pi-id-card"
            i18n-title="@@org.roleTable.emptyTitle"
            title="No roles yet"
            i18n-description="@@org.roleTable.emptyDesc"
            description="Roles you create for this organization will appear here."
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
