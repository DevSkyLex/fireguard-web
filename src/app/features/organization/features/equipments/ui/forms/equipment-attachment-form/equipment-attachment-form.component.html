<form [formGroup]="form" (ngSubmit)="submit()" class="grid gap-3 lg:grid-cols-[1fr_1fr_2fr_auto]">
  <input
    pInputText
    formControlName="fileName"
    placeholder="File name"
    i18n-placeholder="@@equipment.attach.fileName"
  />
  <input
    pInputText
    formControlName="mimeType"
    placeholder="MIME type"
    i18n-placeholder="@@equipment.attach.mimeType"
  />
  <input
    pInputText
    formControlName="content"
    placeholder="Base64 content"
    i18n-placeholder="@@equipment.attach.content"
  />
  <p-button
    type="submit"
    label="Attach"
    i18n-label="@@equipment.attach.submit"
    icon="pi pi-paperclip"
    [loading]="loading()"
    [disabled]="form.invalid || loading()"
  />
  @if (form.invalid && form.touched) {
    <p-message
      severity="error"
      variant="simple"
      class="lg:col-span-4"
      i18n="@@equipment.attach.error"
      >File name, MIME type and Base64 content are required.</p-message
    >
  }
</form>
