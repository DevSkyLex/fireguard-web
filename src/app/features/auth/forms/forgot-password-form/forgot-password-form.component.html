<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-8 w-full">

  <!-- Email Field -->
  <div class="flex flex-col gap-2">
    <label for="email" class="text-sm font-medium text-surface-700">Email Address</label>
    <p-iconfield>
      <p-inputicon class="pi pi-envelope" />
      <input pInputText id="email" formControlName="email" class="w-full" placeholder="example@email.com"
        [disabled]="loading()" />
    </p-iconfield>

    @if (form.controls.email.invalid && form.controls.email.touched) {
    <p-message severity="error" variant="simple" size="small">
      @if (form.controls.email.hasError('required')) {
      <span>Email is required.</span>
      }
      @if (form.controls.email.hasError('email')) {
      <span>Please enter a valid email address.</span>
      }
    </p-message>
    }
  </div>

  <!-- Actions -->
  <div class="flex flex-col gap-3">
    <p-button label="Send Verification Code" type="submit" [loading]="loading()" [disabled]="form.invalid || loading()"
      styleClass="w-full" />
  </div>
</form>
