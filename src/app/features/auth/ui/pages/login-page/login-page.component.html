<div id="login-page" class="flex w-full flex-col gap-7">
  <section class="flex flex-col">
    <h2
      class="mb-2 text-2xl font-semibold text-surface-900 dark:text-surface-100"
      i18n="@@auth.login.title"
    >
      Welcome Back
    </h2>
    <p class="text-sm text-surface-600 dark:text-surface-400" i18n="@@auth.login.subtitle">
      Please sign in to your account to continue.
    </p>
  </section>

  <!-- Login form -->
  <section class="flex flex-col">
    <app-login-form [loading]="loading()" (submitted)="handleLogin($event)" />
  </section>
</div>
