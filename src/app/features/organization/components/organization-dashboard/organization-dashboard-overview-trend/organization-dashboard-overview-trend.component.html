<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  title="Operational Flow"
  description="Inspection throughput and non-conformity pressure over time"
  [metrics]="dashboardStore.summaryMetrics()"
  [loading]="dashboardStore.isLoading()"
>
  <ng-template #action>
    <div class="flex items-center gap-2">
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-calendar"></i>
        </p-inputgroup-addon>
        <p-select
          [ngModel]="dashboardStore.selectedGranularity()"
          (ngModelChange)="dashboardStore.setGranularity($event)"
          [options]="dashboardStore.granularityOptions()"
          optionLabel="label"
          optionValue="value"
          [loading]="dashboardStore.isLoading()"
          size="small"
        />
      </p-inputgroup>

      <p-button
        icon="pi pi-ellipsis-v"
        severity="secondary"
        size="small"
        outlined
        (onClick)="onMenuToggle($event)"
      />
    </div>
  </ng-template>

  <ng-template #content>
    <div class="h-72">
      @if (dashboardStore.isLoading() && !dashboardStore.data()) {
        <p-skeleton
          height="100%"
          class="w-full"
        />
      } @else {
        <p-chart
          type="line"
          [data]="dashboardStore.chartData()"
          [options]="dashboardStore.chartOptions()"
          class="block h-full"
          [style]="{ height: '100%' }"
          fluid
        />
      }
    </div>
  </ng-template>

  <ng-template #footer>
    <div class="flex flex-wrap items-center gap-2">
      @defer (on idle) {
        <p-datepicker
          selectionMode="range"
          [ngModel]="dashboardStore.selectedDateRange()"
          [ngModelOptions]="{ updateOn: 'blur' }"
          (ngModelChange)="dashboardStore.setDateRange($event)"
          [maxDate]="today"
          placeholder="Select date range"
          [showClear]="true"
          [showTime]="true"
          hourFormat="24"
          size="small"
          appendTo="body"
          dateFormat="dd/mm/yy"
          [disabled]="dashboardStore.isLoading()"
        />
      }
      <p-togglebutton
        [ngModel]="dashboardStore.compareEnabled()"
        (ngModelChange)="dashboardStore.setCompareEnabled($event)"
        onLabel="Compare ON"
        offLabel="Compare OFF"
        size="small"
        [disabled]="dashboardStore.isLoading()"
      />
    </div>
  </ng-template>
</app-trend-card>
