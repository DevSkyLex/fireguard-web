<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  [title]="cardTitle()"
  [description]="cardDescription()"
  [metrics]="summaryMetrics()"
  [loading]="isLoading()"
>
  <ng-template #action>
    <app-asset-growth-toolbar
      (menuToggle)="onMenuToggle($event)"
    />
  </ng-template>

  <ng-template #content>
    <app-asset-growth-chart />
  </ng-template>

  <ng-template #footer>
    <app-asset-growth-filters />
  </ng-template>
</app-trend-card>
