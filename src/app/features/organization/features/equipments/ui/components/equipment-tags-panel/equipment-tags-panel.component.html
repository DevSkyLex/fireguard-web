<section
  class="rounded-lg border border-surface-200 bg-surface-0 dark:border-surface-800 dark:bg-surface-950"
>
  <header
    class="flex items-center justify-between border-b border-surface-200 px-4 py-3 dark:border-surface-800"
  >
    <div class="flex items-center gap-2">
      <i class="pi pi-tags text-sm text-surface-500"></i>
      <h2
        class="text-sm font-semibold text-surface-900 dark:text-surface-100"
        i18n="@@equipment.tags.title"
      >
        Tags
      </h2>
    </div>
    <span class="text-xs text-surface-500">{{ tags().length }}</span>
  </header>
  <div class="p-4">
    <div class="mb-4 flex min-h-8 flex-wrap gap-2">
      @for (tag of tags(); track tag.id) {
        <p-chip [label]="tag.name" [removable]="canManage()" (onRemove)="remove.emit(tag)" />
      } @empty {
        <span class="text-xs text-surface-500" i18n="@@equipment.tags.empty"
          >No tags assigned.</span
        >
      }
    </div>
    @if (canManage()) {
      <div class="flex gap-2">
        <input
          pInputText
          [formControl]="control"
          placeholder="Tag name"
          i18n-placeholder="@@equipment.tags.placeholder"
          class="flex-1"
          (keydown.enter)="submit()"
        />
        <p-button
          icon="pi pi-plus"
          ariaLabel="Add tag"
          i18n-ariaLabel="@@equipment.tags.addAria"
          size="small"
          [loading]="loading()"
          [disabled]="control.invalid"
          (onClick)="submit()"
        />
      </div>
    }
  </div>
</section>
