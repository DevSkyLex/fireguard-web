<div
  id="dashboard-layout"
  class="flex min-h-dvh bg-surface-0 transition-colors dark:bg-surface-950"
>
  <!-- Primary sidebar: always visible on desktop, fixed width -->
  <aside
    class="sticky top-0 hidden h-dvh w-60 shrink-0 border-r border-surface-200 transition-colors lg:flex dark:border-surface-800"
  >
    <app-dashboard-layout-sidebar class="w-full" variant="primary" />
  </aside>

  <!-- Secondary sidebar: visible only when a contribution is active, resizable -->
  @if (hasActiveContextPanel()) {
    <aside
      class="sticky top-0 hidden h-dvh shrink-0 border-r border-surface-200 transition-colors lg:flex dark:border-surface-800"
      [style.width.px]="sidebarService.width()"
    >
      <app-dashboard-layout-context-panel class="w-full" />

      <button
        type="button"
        class="absolute top-1/2 right-0 z-10 flex h-15 w-3 translate-x-1/2 -translate-y-1/2 cursor-col-resize items-center justify-center rounded-sm border border-surface-200 bg-surface-0 transition-colors hover:bg-surface-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary active:bg-surface-100 dark:border-surface-800 dark:bg-surface-950 dark:hover:bg-surface-900 dark:active:bg-surface-800"
        role="separator"
        aria-label="Resize sidebar"
        aria-orientation="vertical"
        [attr.aria-valuemin]="0"
        [attr.aria-valuemax]="sidebarService.maxWidth()"
        [attr.aria-valuenow]="sidebarService.width()"
        appDashboardSidebarResizeHandle
        pRipple
      >
        <i class="pi pi-ellipsis-v text-xs text-surface-400"></i>
      </button>
    </aside>
  }

  <!-- Mobile drawer: merged navigation (primary + organization section when active) -->
  <p-drawer
    [visible]="sidebarService.visible()"
    (visibleChange)="sidebarService.setVisible($event)"
    [blockScroll]="true"
  >
    <ng-template #headless>
      <app-dashboard-layout-sidebar />
    </ng-template>
  </p-drawer>

  <!-- Main area -->
  <div class="grid w-full min-w-0 grid-rows-[auto_1fr] bg-surface-50 dark:bg-surface-900">
    <app-dashboard-layout-header />
    <app-dashboard-layout-content>
      <router-outlet />
    </app-dashboard-layout-content>
  </div>
</div>
