<div
  class="flex h-full w-full flex-col border-r border-surface-200 bg-surface-0 text-surface-950 transition-colors dark:border-surface-800 dark:bg-surface-950 dark:text-surface-50"
>
  <section class="shrink-0">
    <app-dashboard-layout-sidebar-header
      [iconOnly]="variant() === 'primary' ? iconOnly() : false"
      [collapsible]="variant() === 'primary' ? collapsible() : false"
    />
  </section>

  <!-- Sidebar navigation -->
  <section class="min-h-0 flex-1 overflow-y-auto">
    @if (variant() === 'primary') {
      <app-dashboard-layout-sidebar-navigation
        [items]="navigationService.primaryItems()"
        [iconOnly]="iconOnly()"
      />
    } @else {
      <app-dashboard-layout-sidebar-navigation />
    }
  </section>

  <!-- Sidebar footer: copyright only (expanded mode only) -->
  @if (!(variant() === 'primary' && iconOnly())) {
    <app-dashboard-layout-sidebar-footer />
  }
</div>
