<p-drawer
  header="Add field discovery"
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [appendTo]="'body'"
  [modal]="true"
  [blockScroll]="true"
  [dismissible]="!loading()"
  [closeOnEscape]="!loading()"
  position="right"
  [pt]="drawerPt"
>
  <ng-template #content>
    <app-intervention-discovery-form
      [loading]="loading()"
      [disabled]="disabled()"
      [equipmentTypeOptions]="equipmentTypeOptions()"
      (submitted)="submitted.emit($event)"
    />
  </ng-template>
</p-drawer>
