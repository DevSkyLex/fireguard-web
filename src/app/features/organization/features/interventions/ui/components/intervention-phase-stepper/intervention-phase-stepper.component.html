<nav
  class="rounded-xl border border-surface-200 bg-surface-0 px-4 py-4 sm:px-6 dark:border-surface-800 dark:bg-surface-950"
  i18n-aria-label="@@intervention.stepper.aria"
  aria-label="Intervention workflow progress"
>
  <ol class="flex items-start">
    @for (step of steps(); track step.key; let first = $first) {
      <li
        class="relative flex flex-1 flex-col items-center text-center"
        [attr.aria-current]="step.state === 'current' ? 'step' : null"
      >
        @if (!first) {
          <span
            class="absolute top-3.5 right-1/2 left-[-50%] -z-10 h-0.5 rounded-full transition-colors duration-300 motion-reduce:transition-none"
            [class]="step.connectorClass"
            aria-hidden="true"
          ></span>
        }

        <span
          class="flex h-7 w-7 items-center justify-center rounded-full text-xs font-semibold transition-all duration-200 motion-reduce:transition-none"
          [class]="step.indicatorClass"
        >
          @if (step.state === 'done') {
            <i class="pi pi-check text-[0.65rem]" aria-hidden="true"></i>
          } @else {
            <i [class]="step.icon + ' text-[0.7rem]'" aria-hidden="true"></i>
          }
        </span>

        <span class="mt-2 px-1 text-xs font-medium sm:text-sm" [class]="step.labelClass">
          {{ step.label }}
        </span>
        <span class="mt-0.5 hidden px-1 text-xs text-surface-500 sm:block dark:text-surface-400">
          {{ step.hint }}
        </span>
      </li>
    }
  </ol>
</nav>
