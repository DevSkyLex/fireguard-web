<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<app-trend-card
  title="Facilities Created"
  description="New facilities registered over time"
  [metrics]="summaryMetrics()"
  [loading]="dashboardStore.isQueryLoading()"
>
  <ng-template #action>
    <div class="flex items-center gap-2">
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-calendar"></i>
        </p-inputgroup-addon>
        <p-select
          [ngModel]="dashboardStore.selectedGranularity()"
          (ngModelChange)="dashboardStore.setGranularity($event)"
          [options]="dashboardStore.granularityOptions()"
          optionLabel="label"
          optionValue="value"
          [loading]="dashboardStore.isQueryLoading()"
          size="small"
        />
      </p-inputgroup>

      <p-button
        icon="pi pi-ellipsis-v"
        severity="secondary"
        size="small"
        outlined
        (onClick)="onMenuToggle($event)"
      />
    </div>
  </ng-template>

  <ng-template #content>
    <div class="h-72">
      @if (dashboardStore.isQueryLoading() && !dashboardStore.queryData()) {
        <p-skeleton height="100%" class="w-full" />
      } @else {
        <p-chart
          type="bar"
          [data]="chartData()"
          [options]="chartOptions()"
          class="block h-full"
          [style]="{ height: '100%' }"
          fluid
        />
      }
    </div>
  </ng-template>

  <ng-template #footer>
    <div class="flex flex-wrap items-center gap-2">
      <p-select
        [ngModel]="dashboardStore.selectedFacilityType()"
        (ngModelChange)="dashboardStore.setFacilityType($event)"
        [options]="facilityTypeOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Type"
        [showClear]="true"
        [loading]="dashboardStore.isQueryLoading()"
        size="small"
      >
        <ng-template #item let-option>
          <span class="flex items-center gap-2">
            <i [class]="option.icon"></i>
            {{ option.label }}
          </span>
        </ng-template>
        <ng-template #selectedItem>
          @let option = selectedFacilityTypeOption();
          @if (option) {
            <span class="flex items-center gap-2">
              <i [class]="option.icon"></i>
              {{ option.label }}
            </span>
          }
        </ng-template>
      </p-select>
      @defer (on idle) {
        <p-datepicker
          selectionMode="range"
          [ngModel]="dashboardStore.selectedDateRange()"
          [ngModelOptions]="{ updateOn: 'blur' }"
          (ngModelChange)="dashboardStore.setDateRange($event)"
          [maxDate]="today"
          placeholder="Select date range"
          [showClear]="true"
          [showTime]="true"
          hourFormat="24"
          size="small"
          appendTo="body"
          dateFormat="dd/mm/yy"
          [disabled]="dashboardStore.isQueryLoading()"
        />
      }
      <p-togglebutton
        [ngModel]="dashboardStore.compareEnabled()"
        (ngModelChange)="dashboardStore.setCompareEnabled($event)"
        onLabel="Compare ON"
        offLabel="Compare OFF"
        size="small"
        [disabled]="dashboardStore.isQueryLoading()"
      />
    </div>
  </ng-template>
</app-trend-card>
