<div [formGroup]="form" class="grid gap-4">
  @if (store.canReadEquipment()) {
    <div class="flex flex-col gap-2">
      <label
        for="asset-growth-equipment-type"
        class="text-sm font-medium text-surface-700 dark:text-surface-300"
      >
        Equipment type
      </label>

      <p-select
        id="asset-growth-equipment-type"
        formControlName="equipmentType"
        [options]="equipmentTypeOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="All equipment types"
        [showClear]="true"
        [loading]="store.isQueryLoading()"
        class="w-full"
      />
    </div>
  }

  @if (store.canReadEquipment()) {
    <div class="flex flex-col gap-2">
      <label
        for="asset-growth-equipment-status"
        class="text-sm font-medium text-surface-700 dark:text-surface-300"
      >
        Equipment status
      </label>

      <p-select
        id="asset-growth-equipment-status"
        formControlName="equipmentStatus"
        [options]="equipmentStatusOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="All equipment statuses"
        [showClear]="true"
        [loading]="store.isQueryLoading()"
        class="w-full"
      >
        <ng-template #item let-option>
          <app-tag [descriptor]="option" variant="inline" />
        </ng-template>
        <ng-template #selectedItem>
          @let option = selectedEquipmentStatusOption();
          @if (option) {
            <app-tag [descriptor]="option" variant="inline" />
          }
        </ng-template>
      </p-select>
    </div>
  }

  @if (store.canReadFacilities()) {
    <div class="flex flex-col gap-2">
      <label
        for="asset-growth-facility-type"
        class="text-sm font-medium text-surface-700 dark:text-surface-300"
      >
        Facility type
      </label>

      <p-select
        id="asset-growth-facility-type"
        formControlName="facilityType"
        [options]="facilityTypeOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="All facility types"
        [showClear]="true"
        [loading]="store.isQueryLoading()"
        class="w-full"
      >
        <ng-template #item let-option>
          <span class="flex items-center gap-2">
            <i [class]="option.icon"></i>
            {{ option.label }}
          </span>
        </ng-template>
        <ng-template #selectedItem>
          @let option = selectedFacilityTypeOption();
          @if (option) {
            <span class="flex items-center gap-2">
              <i [class]="option.icon"></i>
              {{ option.label }}
            </span>
          }
        </ng-template>
      </p-select>
    </div>
  }

  <app-trend-base-filters-form
    dateRangeId="asset-growth-date-range"
    [dateRange]="store.draftDateRange()"
    [compareEnabled]="store.draftCompareEnabled()"
    [loading]="store.isQueryLoading()"
    (dateRangeChange)="store.setDraftDateRange($event)"
    (compareEnabledChange)="store.setDraftCompareEnabled($event)"
  />
</div>
