<div class="flex flex-col items-center gap-3 px-4 py-16 text-center">
  <i class="pi text-6xl text-surface-400" [class]="icon()" aria-hidden="true"></i>
  <h3 class="text-lg font-semibold text-surface-900 dark:text-surface-100">{{ title() }}</h3>
  @if (description(); as description) {
    <span class="max-w-prose text-sm text-surface-500 dark:text-surface-400">
      {{ description }}
    </span>
  }
  <ng-content />
</div>
