name: Docker Image

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: docker-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30
    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Prepare image references
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_ref="${image_name}:sha-${SOURCE_SHA}"
          latest_ref="${image_name}:latest"

          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${latest_ref}" >> "$GITHUB_OUTPUT"

      - name: Validate build configuration
        shell: bash
        run: |
          test -n "${{ secrets.APP_API_URL }}" || { echo "APP_API_URL secret is required."; exit 1; }
          test -n "${{ secrets.APP_MERCURE_HUB_URL }}" || { echo "APP_MERCURE_HUB_URL secret is required."; exit 1; }

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.latest_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_API_URL=${{ secrets.APP_API_URL }}
            APP_MERCURE_HUB_URL=${{ secrets.APP_MERCURE_HUB_URL }}
            APP_NAME=${{ vars.APP_NAME || 'Fireguard' }}
            APP_MAINTENANCE=${{ vars.APP_MAINTENANCE || 'false' }}
