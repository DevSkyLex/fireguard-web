<div id="facility-list" class="grid h-full grid-rows-[auto_1fr]">
  <section
    class="flex flex-col gap-2 border-b border-surface-200 bg-surface-50 p-8 dark:border-surface-800 dark:bg-surface-900"
  >
    <div class="flex flex-col justify-between">
      <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-100">Facilities</h1>
      <p class="text-sm text-surface-700 dark:text-surface-300">
        Manage facilities for this organization.
      </p>
    </div>
  </section>

  <section class="h-full min-h-0 overflow-hidden">
    <app-facility-dataview
      class="flex h-full flex-col"
      [facilities]="store.facilities()"
      [total]="store.totalFacilities()"
      [loading]="store.isLoadingFacilities()"
      [initialPage]="page()"
      (load)="onLoad($event)"
      (pageChange)="onPageChange($event)"
      (view)="onView($event)"
      (edit)="onEdit($event)"
      (add)="onAdd()"
      (archive)="onArchive($event)"
    />
  </section>
</div>
