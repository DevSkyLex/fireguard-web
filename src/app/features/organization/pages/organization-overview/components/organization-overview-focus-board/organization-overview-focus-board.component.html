<p-card
  styleClass="rounded-[1rem] border border-surface-200 bg-surface-0 shadow-none dark:border-surface-800 dark:bg-surface-900"
>
  <div class="border-b border-surface-200 pb-5 dark:border-surface-800">
    <p class="text-xs font-semibold uppercase tracking-[0.24em] text-surface-400 dark:text-surface-500">
      Focus board
    </p>
    <h2 class="mt-1 text-xl font-semibold tracking-tight text-surface-900 dark:text-surface-0">
      What stands out now
    </h2>
  </div>

  <div class="mt-5 grid gap-3">
    @for (item of items(); track item.label) {
      <div class="rounded-lg border border-surface-200 bg-surface-50 px-4 py-4 dark:border-surface-800 dark:bg-surface-800">
        <div class="flex items-start justify-between gap-4">
          <div class="min-w-0">
            <p class="text-sm font-semibold text-surface-900 dark:text-surface-0">
              {{ item.label }}
            </p>
            <p class="mt-2 text-sm leading-6 text-surface-500 dark:text-surface-400">
              {{ item.helper }}
            </p>
          </div>

          <p-tag
            [value]="item.value"
            [severity]="item.severity"
            [rounded]="true"
          />
        </div>
      </div>
    }
  </div>
</p-card>
