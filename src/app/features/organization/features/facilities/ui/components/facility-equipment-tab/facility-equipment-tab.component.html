<app-facility-equipment-table
  class="flex min-h-0 flex-1 flex-col"
  [equipments]="store.equipmentList()"
  [total]="store.totalEquipment()"
  [loading]="store.isLoadingEquipment()"
  [empty]="store.isEmpty()"
  [initialPage]="page()"
  (load)="onLoad($event)"
  (pageChange)="onPageChange($event)"
  (add)="onAdd()"
  (view)="onView($event)"
  (edit)="onEdit($event)"
/>
