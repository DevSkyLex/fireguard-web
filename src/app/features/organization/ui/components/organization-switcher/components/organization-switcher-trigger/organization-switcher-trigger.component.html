@if (isLoading() && !organization()) {
  <p-skeleton width="9rem" height="2rem" borderRadius="0.375rem" />
} @else {
  <p-button
    severity="secondary"
    [outlined]="true"
    [disabled]="isSwitching()"
    (onClick)="onButtonClick($event)"
    size="small"
  >
    @if (organization(); as org) {
      <span class="flex items-center gap-2">
        <p-avatar
          [image]="org.logoUrl || undefined"
          [label]="org.logoUrl ? undefined : orgInitials(org.name)"
          [pt]="avatarPt(org)"
        />
        <span class="max-w-32 truncate font-medium">{{ org.name }}</span>

        <div class="mx-auto">
          @if (isSwitching()) {
            <i class="pi pi-spin pi-spinner shrink-0 text-sm"></i>
          } @else {
            <i class="pi pi-chevron-down shrink-0 text-[10px]"></i>
          }
        </div>
      </span>
    } @else {
      <span class="flex items-center gap-2">
        <span class="size-4 shrink-0 rounded bg-surface-200 dark:bg-surface-700"></span>
        <span i18n="@@org.switcher.selectWorkspace">Select workspace</span>
        <i class="pi pi-chevron-down shrink-0 text-[10px]"></i>
      </span>
    }
  </p-button>
}
