@if (pageHeaderService.title(); as title) {
  <section
    class="flex flex-col gap-3 border-b border-surface-200 bg-surface-50/50 px-3 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6 sm:py-5 lg:px-8 xl:px-10 dark:border-surface-800 dark:bg-surface-900/50"
  >
    <h1 class="truncate text-2xl font-semibold text-surface-900 dark:text-surface-100">
      {{ title | titlecase }}
    </h1>

    @if (pageHeaderService.actions.length) {
      <div class="flex shrink-0 items-center gap-2">
        @for (action of pageHeaderService.actions; track action) {
          <ng-container *ngComponentOutlet="action" />
        }
      </div>
    }
  </section>
}
