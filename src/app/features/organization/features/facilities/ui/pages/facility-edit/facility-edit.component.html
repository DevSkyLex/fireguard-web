<div id="facility-edit" class="flex flex-col">
  <section
    class="flex flex-col gap-2 border-b border-surface-200 bg-surface-50 p-8 dark:border-surface-800 dark:bg-surface-900"
  >
    <div class="flex flex-col justify-between">
      <h1 class="text-2xl font-semibold text-surface-900 dark:text-surface-100">Edit Facility</h1>
      <p class="text-sm text-surface-700 dark:text-surface-300">Update facility information.</p>
    </div>
  </section>

  <section class="max-w-2xl p-8">
    @if (isLoading()) {
      <div class="flex flex-col gap-8">
        <p-skeleton width="100%" height="2.5rem" />
        <p-skeleton width="100%" height="2.5rem" />
        <p-skeleton width="100%" height="2.5rem" />
        <p-skeleton width="100%" height="2.5rem" />
      </div>
    } @else if (facility(); as facility) {
      <app-facility-form
        [facility]="facility"
        [loading]="store.isUpdating()"
        (submitted)="handleSubmit($event)"
        (cancelled)="handleCancel()"
      />
    }
  </section>
</div>
