<div class="mx-auto flex w-full max-w-5xl flex-col gap-8 pb-8">
  <header class="flex items-start gap-4 border-b border-surface-200 pb-6 dark:border-surface-800">
    <span
      class="grid size-11 shrink-0 place-items-center rounded-xl bg-primary-50 text-primary-600 dark:bg-primary-950 dark:text-primary-400"
      aria-hidden="true"
    >
      <i class="pi pi-flag-fill text-lg"></i>
    </span>
    <div class="min-w-0">
      <h1 class="text-2xl font-semibold text-balance">Create a field intervention</h1>
      <p class="mt-1 max-w-2xl text-sm text-surface-600 dark:text-surface-300">
        Choose the operational objective first. The workspace will then guide scope preparation and
        assignment.
      </p>
    </div>
  </header>

  <app-intervention-create-form
    [loading]="creating()"
    [optionsLoading]="planningOptions.loading()"
    [siteOptions]="planningOptions.sites()"
    [memberOptions]="planningOptions.members()"
    (submitted)="create($event)"
  />
</div>
