<div id="password-reset-verify-page" class="flex w-full flex-col gap-6">
  <section class="flex flex-col">
    <h2
      class="mb-2 text-2xl font-semibold text-surface-900 dark:text-surface-100"
      i18n="@@auth.passwordResetVerify.title"
    >
      Verify Password Reset
    </h2>
    <p
      class="text-sm text-surface-600 dark:text-surface-400"
      i18n="@@auth.passwordResetVerify.subtitle"
    >
      Please enter the verification code sent to your email to proceed with resetting your password.
    </p>
  </section>

  <!-- OTP verification form -->
  <section class="flex flex-col">
    <app-otp-verification-form
      [loading]="loading()"
      [resendIn]="resendIn()"
      (submitted)="handleVerify($event)"
      (cancelled)="handleCancel()"
      (resend)="handleResend()"
    />
  </section>
</div>
