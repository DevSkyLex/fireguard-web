name: fireguard-web

services:
  fireguard-web:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    container_name: ${CONTAINER_NAME:-fireguard-web}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
    networks:
      - traefik_proxy
    labels:
      - 'traefik.enable=true'

      - 'traefik.http.routers.fireguard-web-http.rule=Host(`app.fireguard.valentin-fortin.pro`)'
      - 'traefik.http.routers.fireguard-web-http.entrypoints=web'
      - 'traefik.http.routers.fireguard-web-http.middlewares=fireguard-web-https-redirect'
      - 'traefik.http.middlewares.fireguard-web-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.fireguard-web.rule=Host(`app.fireguard.valentin-fortin.pro`)'
      - 'traefik.http.routers.fireguard-web.entrypoints=websecure'
      - 'traefik.http.routers.fireguard-web.tls=true'
      - 'traefik.http.routers.fireguard-web.tls.certresolver=letsencrypt'
      - 'traefik.http.services.fireguard-web.loadbalancer.server.port=4000'

networks:
  traefik_proxy:
    external: true
