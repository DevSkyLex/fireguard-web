<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex h-full flex-col gap-4">
  <p class="text-sm text-surface-600 dark:text-surface-300">
    Explain why this work cannot be completed. The manager will review this reason before
    publication.
  </p>

  <label class="grid gap-1.5 text-sm font-medium">
    <span>Reason <span class="text-red-500" aria-hidden="true">*</span></span>
    <textarea
      pTextarea
      formControlName="reason"
      class="min-h-32 w-full resize-y"
      placeholder="e.g. Equipment inaccessible — locked plant room, no key on site."
      [invalid]="form.controls.reason.invalid && form.controls.reason.touched"
    ></textarea>
    @if (form.controls.reason.invalid && form.controls.reason.touched) {
      <small class="flex items-center gap-1 font-normal text-red-600 dark:text-red-400">
        <i class="pi pi-exclamation-circle text-[0.7rem]" aria-hidden="true"></i>
        A reason is required to skip this work.
      </small>
    }
  </label>

  <p-button
    class="mt-auto block"
    [fluid]="true"
    label="Confirm skip"
    type="submit"
    icon="pi pi-forward"
    severity="secondary"
    [loading]="loading()"
    [disabled]="form.invalid || disabled() || loading()"
  />
</form>
