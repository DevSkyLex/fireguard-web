<div id="login-page" class="flex flex-col gap-7 w-full">
  <section class="flex flex-col">
    <h2 class="text-2xl font-semibold text-surface-900 mb-2">
      Welcome Back
    </h2>
    <p class="text-sm text-surface-600">
      Please sign in to your account to continue.
    </p>
  </section>

  <!-- Login form -->
  <section class="flex flex-col">
    <app-login-form
      [loading]="loading()"
      (submitted)="handleLogin($event)"
    />
  </section>
</div>
